<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 登录</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{width:100%;max-width:420px}
    .card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.15)}
    h1{color:#333;text-align:center;font-size:22px;margin-bottom:3px}
    .subtitle{color:#666;text-align:center;font-size:13px;margin-bottom:20px}
    h2{color:#333;font-size:16px;margin-bottom:15px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-weight:600;color:#333;font-size:13px;margin-bottom:4px}
    .form-group input{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .form-group input:focus{border-color:#667eea;outline:none}
    .btn{width:100%;padding:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
    .btn:hover{opacity:0.9}
    .btn:active{transform:scale(0.98)}
    .tabs{display:flex;gap:10px;margin-bottom:20px}
    .tab{flex:1;padding:8px;text-align:center;border-bottom:2px solid #ddd;color:#666;cursor:pointer}
    .tab.active{border-color:#667eea;color:#667eea;font-weight:600}
    .error{background:#fee;border:1px solid #fcc;color:#c33;padding:10px;border-radius:6px;margin-bottom:15px;font-size:13px;display:none}
    .tips{color:#999;font-size:12px;margin-top:15px;text-align:center}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🦌 鹿城学院论坛</h1>
      <p class="subtitle">校园交流社区</p>
      
      <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">登录</div>
        <div class="tab" onclick="switchTab('register')">注册</div>
      </div>
      
      <div class="error" id="error"></div>
      
      <!-- 登录表单 -->
      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="loginUsername" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn">登录</button>
      </form>
      
      <!-- 注册表单 -->
      <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="regUsername" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="regNickname" required placeholder="请输入昵称">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" required placeholder="请输入密码">
        </div>
        <div class="form-group">
          <label>管理员注册码（可选）</label>
          <input type="password" id="regAdminCode" placeholder="普通用户留空">
        </div>
        <button type="submit" class="btn">注册</button>
      </form>
      
      <p class="tips">测试账号: admin / 123456</p>
    </div>
  </div>

<script>
// 切换标签
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  if (tab === 'login') {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
  }
  hideError();
}

// 显示错误
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

// 隐藏错误
function hideError() {
  document.getElementById('error').style.display = 'none';
}

// 登录
async function doLogin(e) {
  e.preventDefault();
  hideError();
  
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  // 模拟登录（本地测试）
  if (username === 'admin' && password === '123456') {
    const user = { username, nickname: '管理员', role: 'admin' };
    sessionStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'forum-new.html';
    return;
  }
  
  // 简单测试账号
  if (password === '123456') {
    const user = { username, nickname: username, role: 'student' };
    sessionStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'forum-new.html';
    return;
  }
  
  showError('用户名或密码错误');
}

// 注册
async function doRegister(e) {
  e.preventDefault();
  hideError();
  
  const username = document.getElementById('regUsername').value.trim();
  const nickname = document.getElementById('regNickname').value.trim();
  const password = document.getElementById('regPassword').value;
  const adminCode = document.getElementById('regAdminCode').value;
  
  if (!username || !nickname || !password) {
    showError('请填写完整信息');
    return;
  }
  
  // 简单注册（本地测试）
  const role = adminCode ? 'admin' : 'student';
  const user = { username, nickname, role };
  sessionStorage.setItem('currentUser', JSON.stringify(user));
  
  alert('注册成功！');
  window.location.href = 'forum-new.html';
}

// 清除之前的 session
sessionStorage.clear();
</script>
</body>
</html>
