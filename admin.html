<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>用户管理 - 鹿城学院论坛</title>
  <style>
    :root{--bg:#0b0f14;--card:#121821;--muted:#9fb2c3;--text:#e9f0f6;--acc:#4cc9f0;--purple:#a855f7}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .navbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(11,15,20,0.8);border-bottom:1px solid rgba(255,255,255,0.06)}
    .nav-inner{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
    .nav-logo{font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
    .nav-links{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-link{color:var(--muted);padding:6px 12px;border-radius:6px;font-size:14px;text-decoration:none}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,0.06)}
    .container{max-width:1200px;margin:20px auto;padding:0 16px}
    .page-title{font-size:20px;font-weight:600;margin-bottom:16px}
    .search-box{display:flex;gap:8px;margin-bottom:16px}
    .search-box input{flex:1;padding:10px;background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);font-size:14px}
    .search-box button{padding:10px 16px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px}
    .table-wrapper{overflow-x:auto;background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:12px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{background:rgba(255,255,255,0.04);padding:12px;text-align:left;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08)}
    td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
    tr:hover{background:rgba(255,255,255,0.02)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;overflow:hidden}
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .role-badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600}
    .role-admin{background:rgba(239,68,68,0.2);color:#ef4444}
    .role-student{background:rgba(76,201,240,0.2);color:#4cc9f0}
    .role-teacher{background:rgba(34,197,94,0.2);color:#22c55e}
    .btn-small{padding:6px 12px;background:#667eea;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px}
    .btn-small:hover{background:#5568d3}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
    .modal-overlay.active{display:flex}
    .modal{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:14px;width:100%;max-width:500px;padding:24px;max-height:80vh;overflow-y:auto}
    .modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
    .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}
    .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
    .info-label{color:var(--muted);font-size:13px}
    .info-value{font-weight:600;word-break:break-all}
    .empty{text-align:center;padding:40px 20px;color:var(--muted)}
    @media(max-width:768px){
      table{font-size:12px}
      th,td{padding:8px}
      .btn-small{padding:4px 8px;font-size:11px}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="forum.html" class="nav-logo"><img src="logo.jpg" alt="校徽" style="height:24px;width:24px;vertical-align:middle;border-radius:4px;"> 鹿城学院论坛</a>
      <div class="nav-links">
        <a href="forum.html" class="nav-link">首页</a>
        <a href="admin.html" class="nav-link" style="color:var(--acc)">👨‍💼 用户管理</a>
        <button onclick="logout()" style="padding:6px 12px;background:#ef4444;color:white;border:none;border-radius:6px;font-size:12px;cursor:pointer">退出</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-title">👨‍💼 用户管理</div>
    
    <div style="background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:16px">
      <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="adminKeyInput" placeholder="输入管理员密钥以查看用户密码" style="flex:1;padding:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);font-size:14px">
        <button onclick="unlockUserData()" style="padding:10px 16px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">解锁</button>
      </div>
      <div style="color:var(--muted);font-size:12px;margin-top:8px">💡 输入管理员密钥后才能查看用户密码</div>
    </div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索用户名、昵称或邮箱...">
      <button onclick="searchUsers()">搜索</button>
    </div>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>用户名</th>
            <th>昵称</th>
            <th>角色</th>
            <th id="passwordHeader" style="display:none">密码</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTable">
          <tr><td colspan="6" class="empty">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 用户详情弹窗 -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <button class="modal-close" onclick="closeUserModal()">×</button>
      <div class="modal-title">用户详情</div>
      <div id="userDetails"></div>
    </div>
  </div>

  <script>
const USERS_KEY = 'forum_users';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/69c11555aa77b81da90e70f1';
const JSONBIN_KEY = '$2a$10$59Djck2h5v5Jn9Iw6mJXSOowLLNncsWykFED5zdhoe1J9ATaVmcJu';

let currentUser = null;
let allUsers = [];
let isUnlocked = false;

function $(id) { return document.getElementById(id); }

async function init() {
  const userStr = sessionStorage.getItem('currentUser');
  if (!userStr) {
    window.location.href = 'index.html';
    return;
  }
  
  currentUser = JSON.parse(userStr);
  
  // 检查是否是管理员
  if (currentUser.role !== 'admin' && currentUser.username !== 'lohannes') {
    alert('只有管理员可以访问此页面');
    window.location.href = 'forum.html';
    return;
  }
  
  loadUsers();
}

function unlockUserData() {
  const key = $('adminKeyInput').value;
  if (key === 'zrw521..') {
    isUnlocked = true;
    $('adminKeyInput').style.display = 'none';
    $('adminKeyInput').parentElement.querySelector('button').style.display = 'none';
    $('adminKeyInput').parentElement.parentElement.style.display = 'none';
    $('passwordHeader').style.display = 'table-cell';
    renderUsers();
    alert('✅ 已解锁，现在可以查看用户密码');
  } else {
    alert('❌ 密钥错误');
  }
}

async function loadUsers() {
  // 合并本地和云端用户数据
  let localUsers = [];
  let cloudUsers = [];
  
  // 1. 从本地加载
  const usersData = localStorage.getItem(USERS_KEY);
  if (usersData) {
    try {
      localUsers = JSON.parse(usersData);
    } catch(e) {}
  }
  
  // 2. 从云端加载
  try {
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    if (data.record && data.record.users) {
      cloudUsers = data.record.users;
    }
  } catch(e) {
    console.log('云端加载失败:', e);
  }
  
  // 3. 合并两个列表（去重，优先使用云端数据）
  const mergedUsers = [...cloudUsers];
  localUsers.forEach(localUser => {
    if (!mergedUsers.find(u => u.username === localUser.username)) {
      mergedUsers.push(localUser);
    }
  });
  
  // 4. 保存合并结果到本地和云端
  allUsers = mergedUsers;
  localStorage.setItem(USERS_KEY, JSON.stringify(allUsers));
  
  // 5. 同步到云端确保一致
  try {
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    const record = data.record || {};
    
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-ACCESS-KEY': JSONBIN_KEY
      },
      body: JSON.stringify({
        users: allUsers,
        posts: record.posts || [],
        replies: record.replies || [],
        notifications: record.notifications || []
      })
    });
  } catch(e) {
    console.log('云端同步失败:', e);
  }
  
  renderUsers();
}

function renderUsers() {
  if (allUsers.length === 0) {
    $('userTable').innerHTML = '<tr><td colspan="6" class="empty">暂无用户</td></tr>';
    return;
  }
  
  const html = allUsers.map(u => {
    const roleMap = {admin:'管理员',teacher:'老师',student:'学生'};
    const roleName = roleMap[u.role] || '学生';
    const roleClass = 'role-' + (u.role || 'student');
    const createdDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '-';
    
    let passwordCell = '';
    if (isUnlocked) {
      passwordCell = '<td><code style="background:rgba(255,255,255,0.04);padding:4px 8px;border-radius:4px;font-size:12px">' + escapeHtml(u.password) + '</code></td>';
    } else {
      passwordCell = '<td style="display:none"></td>';
    }
    
    const bannedMark = u.is_banned ? '<span style="color:#ef4444;font-weight:600">🚫 已封禁</span>' : '';
    
    return '<tr>' +
      '<td><strong>' + escapeHtml(u.username) + '</strong> ' + bannedMark + '</td>' +
      '<td>' + escapeHtml(u.nickname || '-') + '</td>' +
      '<td><span class="role-badge ' + roleClass + '">' + roleName + '</span></td>' +
      passwordCell +
      '<td>' + createdDate + '</td>' +
      '<td><button class="btn-small" onclick="showUserDetails(\'' + escapeHtml(u.username) + '\')">详情</button></td>' +
    '</tr>';
  }).join('');
  
  $('userTable').innerHTML = html;
}

function searchUsers() {
  const keyword = $('searchInput').value.toLowerCase().trim();
  if (!keyword) {
    renderUsers();
    return;
  }
  
  const filtered = allUsers.filter(u => 
    u.username.toLowerCase().includes(keyword) ||
    (u.nickname && u.nickname.toLowerCase().includes(keyword)) ||
    (u.realName && u.realName.toLowerCase().includes(keyword))
  );
  
  if (filtered.length === 0) {
    $('userTable').innerHTML = '<tr><td colspan="6" class="empty">未找到匹配的用户</td></tr>';
    return;
  }
  
  const html = filtered.map(u => {
    const roleMap = {admin:'管理员',teacher:'老师',student:'学生'};
    const roleName = roleMap[u.role] || '学生';
    const roleClass = 'role-' + (u.role || 'student');
    const createdDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '-';
    
    let passwordCell = '';
    if (isUnlocked) {
      passwordCell = '<td><code style="background:rgba(255,255,255,0.04);padding:4px 8px;border-radius:4px;font-size:12px">' + escapeHtml(u.password) + '</code></td>';
    } else {
      passwordCell = '<td style="display:none"></td>';
    }
    
    return '<tr>' +
      '<td><strong>' + escapeHtml(u.username) + '</strong></td>' +
      '<td>' + escapeHtml(u.nickname || '-') + '</td>' +
      '<td><span class="role-badge ' + roleClass + '">' + roleName + '</span></td>' +
      passwordCell +
      '<td>' + createdDate + '</td>' +
      '<td><button class="btn-small" onclick="showUserDetails(\'' + escapeHtml(u.username) + '\')">查看详情</button></td>' +
    '</tr>';
  }).join('');
  
  $('userTable').innerHTML = html;
}

function showUserDetails(username) {
  const user = allUsers.find(u => u.username === username);
  if (!user) return;
  
  const roleMap = {admin:'管理员',teacher:'老师',student:'学生'};
  const roleName = roleMap[user.role] || '学生';
  
  let passwordRow = '';
  if (isUnlocked) {
    passwordRow = '<div class="info-row">' +
      '<span class="info-label">密码</span>' +
      '<span class="info-value"><code style="background:rgba(255,255,255,0.04);padding:4px 8px;border-radius:4px">' + escapeHtml(user.password) + '</code></span>' +
    '</div>';
  }
  
  const bannedStatus = user.is_banned ? '<span style="color:#ef4444">🚫 已封禁</span>' : '<span style="color:#22c55e">✅ 正常</span>';
  
  let html = '<div class="info-row">' +
    '<span class="info-label">用户名</span>' +
    '<span class="info-value">' + escapeHtml(user.username) + '</span>' +
  '</div>' +
  passwordRow +
  '<div class="info-row">' +
    '<span class="info-label">昵称</span>' +
    '<span class="info-value">' + escapeHtml(user.nickname || '-') + '</span>' +
  '</div>' +
  '<div class="info-row">' +
    '<span class="info-label">真实姓名</span>' +
    '<span class="info-value">' + escapeHtml(user.realName || '-') + '</span>' +
  '</div>' +
  '<div class="info-row">' +
    '<span class="info-label">性别</span>' +
    '<span class="info-value">' + escapeHtml(user.gender || '-') + '</span>' +
  '</div>' +
  '<div class="info-row">' +
    '<span class="info-label">角色</span>' +
    '<span class="info-value">' + roleName + '</span>' +
  '</div>' +
  '<div class="info-row">' +
    '<span class="info-label">账户状态</span>' +
    '<span class="info-value">' + bannedStatus + '</span>' +
  '</div>' +
  '<div class="info-row">' +
    '<span class="info-label">创建时间</span>' +
    '<span class="info-value">' + (user.createdAt ? new Date(user.createdAt).toLocaleString('zh-CN') : '-') + '</span>' +
  '</div>' +
  '<div style="margin-top:16px;display:flex;gap:8px">';
  
  // 只有管理员才能封号/解封
  if (currentUser.role === 'admin' || currentUser.username === 'lohannes') {
    if (user.is_banned) {
      html += '<button onclick="unbanUser(\'' + escapeHtml(user.username) + '\')" style="flex:1;padding:10px;background:#22c55e;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">✅ 解封账户</button>';
    } else {
      html += '<button onclick="banUser(\'' + escapeHtml(user.username) + '\')" style="flex:1;padding:10px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">🚫 封禁账户</button>';
    }
  }
  
  html += '</div>';
  
  $('userDetails').innerHTML = html;
  $('userModal').classList.add('active');
}

function banUser(username) {
  if (!confirm('确定要封禁用户 ' + username + ' 吗？')) return;
  
  const user = allUsers.find(u => u.username === username);
  if (!user) return;
  
  user.is_banned = true;
  localStorage.setItem(USERS_KEY, JSON.stringify(allUsers));
  
  // 同步到云端
  syncToCloud();
  
  alert('✅ 已封禁用户 ' + username);
  showUserDetails(username);
  renderUsers();
}

function unbanUser(username) {
  if (!confirm('确定要解封用户 ' + username + ' 吗？')) return;
  
  const user = allUsers.find(u => u.username === username);
  if (!user) return;
  
  user.is_banned = false;
  localStorage.setItem(USERS_KEY, JSON.stringify(allUsers));
  
  // 同步到云端
  syncToCloud();
  
  alert('✅ 已解封用户 ' + username);
  showUserDetails(username);
  renderUsers();
}

async function syncToCloud() {
  try {
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    const record = data.record || {};
    
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-ACCESS-KEY': JSONBIN_KEY
      },
      body: JSON.stringify({
        users: allUsers,
        posts: record.posts || [],
        replies: record.replies || [],
        notifications: record.notifications || []
      })
    });
  } catch(e) {
    console.log('云端同步失败:', e);
  }
}

function closeUserModal() {
  $('userModal').classList.remove('active');
}

function escapeHtml(text) {
  const map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
  return text.replace(/[&<>"']/g, m => map[m]);
}

function logout() {
  if (confirm('确定要退出吗？')) {
    sessionStorage.removeItem('currentUser');
    window.location.href = 'index.html';
  }
}

init();
  </script>
</body>
</html>
