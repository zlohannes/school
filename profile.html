<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 个人主页</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script>
// Fallback SB_URL/SB_KEY for GitHub Pages
if (typeof SB_URL === 'undefined') { var SB_URL = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL') || ''; }
if (typeof SB_KEY === 'undefined') { var SB_KEY = window.SUPABASE_ANON_KEY || localStorage.getItem('SUPABASE_ANON_KEY') || ''; }
</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh}
    .navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
    .navbar .logo{color:#fff;font-size:18px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:8px}
    .navbar .nav-links{display:flex;align-items:center;gap:6px;margin-left:32px}
    .navbar .nav-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;padding:6px 14px;border-radius:20px;transition:all .2s}
    .navbar .nav-links a:hover,.navbar .nav-links a.active{color:#fff;background:rgba(255,255,255,0.2)}
    .navbar .user-area{margin-left:auto;display:flex;align-items:center;gap:12px}
    .navbar .user-info{display:flex;align-items:center;gap:8px;color:#fff;font-size:13px}
    .role-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;color:#fff}
    .role-student{background:rgba(255,255,255,0.25)}.role-teacher{background:#2196F3}.role-admin{background:#e74c3c}
    .navbar .logout-btn{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.15);border:none;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s}
    .navbar .logout-btn:hover{background:rgba(255,255,255,0.3);color:#fff}
    .container{max-width:800px;margin:24px auto;padding:0 16px}
    .profile-card{background:#fff;border-radius:16px;padding:32px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:24px;position:relative;overflow:hidden}
    .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(135deg,#667eea,#764ba2)}
    .avatar-wrapper{position:relative;z-index:1;display:inline-block;margin-top:50px;margin-bottom:16px;cursor:pointer}
    .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all .3s;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .avatar-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);height:26px;display:flex;align-items:center;justify-content:center;border-radius:0 0 50% 50%;opacity:0;transition:opacity .2s;font-size:12px;color:#fff}
    .avatar-wrapper:hover .avatar-overlay{opacity:1}
    .avatar-wrapper:hover .avatar{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,0.25)}
    .avatar-hint{font-size:11px;color:#999;margin-top:6px;z-index:1;position:relative}
    .profile-card .nickname{font-size:22px;font-weight:700;color:#333;display:flex;align-items:center;justify-content:center;gap:8px}
    .profile-card .stats{display:flex;justify-content:center;gap:40px;margin-top:16px}
    .profile-card .stat{text-align:center}
    .profile-card .stat .num{font-size:24px;font-weight:700;color:#667eea}
    .profile-card .stat .label{font-size:12px;color:#999;margin-top:2px}
    .profile-card .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
    .info-item{padding:8px 12px;background:#f8f9fa;border-radius:8px}
    .info-item .label{font-size:11px;color:#999;margin-bottom:2px}
    .info-item .value{font-size:14px;color:#333;font-weight:500}
    .edit-btn{position:absolute;top:16px;right:16px;z-index:2;background:rgba(255,255,255,0.2);color:#fff;border:none;padding:6px 16px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
    .edit-btn:hover{background:rgba(255,255,255,0.4)}
    .edit-form{display:none;text-align:left;max-width:400px;margin:20px auto 0}
    .edit-form.show{display:block}
    .edit-form .form-group{margin-bottom:12px}
    .edit-form label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
    .edit-form input,.edit-form select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;transition:border-color .2s}
    .edit-form input:focus,.edit-form select:focus{border-color:#667eea;outline:none}
    .edit-form .btn-row{display:flex;gap:8px;margin-top:16px}
    .edit-form .btn-save{flex:1;background:#667eea;color:#fff;border:none;padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .edit-form .btn-save:hover{background:#5568d3}
    .edit-form .btn-save:disabled{opacity:0.5;cursor:not-allowed}
    .edit-form .btn-cancel{flex:1;background:#f0f2f5;color:#666;border:none;padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
    .edit-form .btn-cancel:hover{background:#e4e6e9}
    .tabs{display:flex;background:#fff;border-radius:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden}
    .tab{flex:1;padding:14px;text-align:center;font-size:14px;font-weight:600;color:#999;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent}
    .tab:hover{color:#667eea;background:#f8f9ff}
    .tab.active{color:#667eea;border-bottom-color:#667eea;background:#f8f9ff}
    .post-list,.reply-list{display:flex;flex-direction:column;gap:10px}
    .post-item{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);cursor:pointer;transition:all .25s;text-decoration:none;display:block}
    .post-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
    .post-item .cat-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;font-weight:600;margin-bottom:6px}
    .post-item .title{font-size:15px;font-weight:600;color:#333;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
    .post-item .meta{font-size:12px;color:#999;display:flex;gap:12px;align-items:center}
    .reply-item{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .reply-item .reply-to{font-size:13px;color:#667eea;margin-bottom:4px}
    .reply-item .reply-to a{color:#667eea;text-decoration:none;font-weight:600}
    .reply-item .reply-to a:hover{text-decoration:underline}
    .reply-item .content{font-size:14px;color:#444;line-height:1.6;margin-bottom:6px}
    .reply-item .meta{font-size:12px;color:#999}
    .empty-state{text-align:center;padding:60px 20px;color:#999}
    .empty-state .icon{font-size:48px;margin-bottom:12px}
    .empty-state .text{font-size:14px}
    /* 头像预览弹窗 */
    .avatar-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
    .avatar-modal.active{display:flex}
    .avatar-modal .box{background:white;border-radius:16px;width:100%;max-width:380px;padding:24px;text-align:center}
    .avatar-modal .box h3{font-size:18px;color:#333;margin-bottom:20px}
    .avatar-modal .preview{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.15)}
    .avatar-modal .preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .avatar-modal .btn-row{display:flex;gap:10px}
    .avatar-modal .btn-select{flex:1;background:#f0f2f5;color:#333;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
    .avatar-modal .btn-select:hover{background:#e4e6e9}
    .avatar-modal .btn-upload{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
    .avatar-modal .btn-upload:hover{opacity:0.9}
    .avatar-modal .btn-upload:disabled{opacity:0.5;cursor:not-allowed}
    .avatar-modal .btn-cancel-modal{background:#f5f5f5;color:#666;border:none;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:10px;width:100%}
    .avatar-modal input[type=file]{display:none}
    .avatar-modal .tip{font-size:12px;color:#999;margin-top:10px}
    .upload-progress{width:100%;height:4px;background:#eee;border-radius:2px;margin-top:12px;display:none;overflow:hidden}
    .upload-progress .bar{height:100%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:2px;transition:width .3s;width:0}
    .loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.85);display:none;align-items:center;justify-content:center;z-index:400;flex-direction:column;gap:12px}
    .loading-overlay.show{display:flex}
    .loading-overlay .spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-overlay .text{font-size:14px;color:#666}
    @media(max-width:600px){.navbar{padding:0 12px}.navbar .nav-links{display:none}.navbar .user-info span.full-name{display:none}.profile-card{padding:24px 16px}.profile-card .info-grid{grid-template-columns:1fr}.profile-card .stats{gap:24px}.container{margin:16px auto;padding:0 10px}}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="forum.html" class="logo">🏫 鹿城学院论坛</a>
    <div class="nav-links"><a href="forum.html">🏠 首页</a><a href="profile.html" class="active">👤 我的</a></div>
    <div class="user-area">
      <div class="user-info"><span class="full-name" id="navNickname"></span><span class="role-tag" id="navRole"></span></div>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </nav>
  <div class="container">
    <div class="profile-card" id="profileCard">
      <button class="edit-btn" id="editBtn" onclick="toggleEdit()">✏️ 编辑资料</button>
      <!-- 点击头像 -->
      <div class="avatar-wrapper" onclick="openAvatarModal()">
        <div class="avatar" id="avatarEl"></div>
        <div class="avatar-overlay">📷 换头像</div>
      </div>
      <div class="avatar-hint" id="avatarHint">点击头像可更换</div>
      <div class="nickname"><span id="displayName"></span><span class="role-tag" id="profileRole"></span></div>
      <div class="stats">
        <div class="stat"><div class="num" id="postCount">0</div><div class="label">发帖</div></div>
        <div class="stat"><div class="num" id="replyCount">0</div><div class="label">回复</div></div>
      </div>
      <div class="info-grid" id="infoGrid">
        <div class="info-item"><div class="label">性别</div><div class="value" id="infoGender">-</div></div>
        <div class="info-item"><div class="label">注册时间</div><div class="value" id="infoJoined">-</div></div>
      </div>
      <div class="edit-form" id="editForm">
        <div class="form-group"><label>昵称</label><input type="text" id="editNickname" placeholder="请输入昵称"></div>
        <div class="form-group"><label>性别</label><select id="editGender"><option value="男">男</option><option value="女">女</option></select></div>
        <div class="btn-row">
          <button class="btn-save" id="saveBtn" onclick="saveProfile()">保存</button>
          <button class="btn-cancel" onclick="toggleEdit()">取消</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('posts',this)">📝 我的帖子</div>
      <div class="tab" onclick="switchTab('replies',this)">💬 我的回复</div>
      <div class="tab" id="adminTab" style="display:none" onclick="switchTab('admin',this)">⚙️ 用户管理</div>
    </div>
    <div id="postsTab" class="post-list"></div>
    <div id="repliesTab" class="reply-list" style="display:none"></div>
    <div id="adminTabContent" class="reply-list" style="display:none"></div>
  </div>

  <!-- 头像弹窗 -->
  <div class="avatar-modal" id="avatarModal">
    <div class="box">
      <h3>更换头像</h3>
      <div class="preview" id="avatarPreview"></div>
      <div class="upload-progress" id="uploadProgress"><div class="bar" id="progressBar"></div></div>
      <div class="btn-row">
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">📷 从相册选择</button>
        <button class="btn-upload" id="uploadBtn" onclick="uploadAvatar()" disabled>✅ 确认上传</button>
      </div>
      <button class="btn-cancel-modal" onclick="closeAvatarModal()">取消</button>
      <div class="tip">支持 JPG、PNG、GIF，建议正方形图片</div>
    </div>
  </div>
  <input type="file" id="fileInput" accept="image/*" onchange="previewAvatar(this)">

  <!-- 加载遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="text" id="loadingText">上传中...</div>
  </div>
  <div id="announceBanner" style="background:#fff3cd;border-bottom:1px solid #ffeeba;padding:10px 20px;text-align:center;font-size:13px;color:#856404;display:none">
    <span id="announceText"></span>
    <button onclick="document.getElementById('announceBanner').style.display='none';localStorage.setItem('announceHidden','1')" style="background:none;border:none;font-size:16px;color:#856404;cursor:pointer;padding:0 0 0 8px;line-height:1">×</button>
  </div>

  <script>
const SB_URL='https://tsxnnzcteavcpowsbaye.supabase.co';
const SB_KEY='sb_publishable_SHiGnxlUonmmOFKytrt-Lg_8DXAWJJl';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const catColors={'学习交流':'#4CAF50','校园生活':'#2196F3','二手交易':'#FF9800','求职招聘':'#9C27B0','闲聊灌水':'#FF5722','公告通知':'#f44336'};
const catValue={learning:'学习交流',campus:'校园生活',trade:'二手交易',job:'求职招聘',chat:'闲聊灌水',notice:'公告通知'};
const roleLabel={student:'学生',teacher:'老师',admin:'管理员'};

let currentUser=null,userData=null,allPosts=[],selectedFile=null,currentAvatarUrl='';

document.addEventListener('DOMContentLoaded',init);

async function init(){
  const s=sessionStorage.getItem('currentUser');
  if(!s){location.href='index.html';return}
  currentUser=JSON.parse(s);
  await loadProfile();
  loadAnnouncement();
}

function loadAnnouncement(){var hide=localStorage.getItem('announceHidden');if(hide)return;var msg='⚠️ 网站开发属于开始阶段，连接的是海外服务器，网络波动纯属正常，请耐心等待。如有反馈和建议，请联系 13587769094（微信同号）';document.getElementById('announceText').textContent=msg;document.getElementById('announceBanner').style.display='block'}

function showLoading(text){
  document.getElementById('loadingText').textContent=text||'加载中...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

function renderAvatar(){
  const el=document.getElementById('avatarEl');
  if(userData&&(userData.avatar_data||userData.avatar_url)){
    el.innerHTML=`<img src="${esc(userData.avatar_data||userData.avatar_url)}" alt="头像">`;
    document.getElementById('avatarHint').textContent='点击头像可更换';
  } else {
    const nn=userData?(userData.nickname||currentUser.username):currentUser.username;
    el.textContent=nn.charAt(0).toUpperCase();
  }
  // nav头像同步
  const navEl=document.querySelector('.navbar .user-info');
  if(navEl){
    navEl.innerHTML=`<span class="full-name" id="navNickname">${esc(userData?(userData.nickname||currentUser.username):currentUser.username)}</span><span class="role-tag" id="navRole">${roleLabel[currentUser.role]||'学生'}</span>`;
  }
}

async function loadProfile(){
  showLoading('加载中...');
  const[userRes,postsRes,repliesRes]=await Promise.all([
    sb.from('users').select('*').eq('username',currentUser.username).maybeSingle(),
    sb.from('posts').select('*').eq('author',currentUser.username).order('created_at',{ascending:false}),
    sb.from('replies').select('*').eq('author',currentUser.username).order('created_at',{ascending:false})
  ]);
  hideLoading();
  const user=userRes.data;
  if(!user){return}
  userData=user;
  const nickname=user.nickname||currentUser.username;
  const role=user.role||'student';
  const rTag=document.getElementById('profileRole');
  rTag.textContent=roleLabel[role];rTag.className='role-tag role-'+role;
  document.getElementById('displayName').textContent=nickname;
  renderAvatar();
  document.getElementById('infoGender').textContent=user.gender||'男';
  document.getElementById('infoJoined').textContent=user.created_at?new Date(user.created_at).toLocaleDateString('zh-CN'):'-';
  document.getElementById('editNickname').value=nickname;
  document.getElementById('editGender').value=user.gender||'男';
  document.getElementById('postCount').textContent=postsRes.data?.length||0;
  document.getElementById('replyCount').textContent=repliesRes.data?.length||0;
  allPosts=postsRes.data||[];
  const postsTab=document.getElementById('postsTab');
  if(!allPosts.length){postsTab.innerHTML='<div class="empty-state"><div class="icon">📭</div><div class="text">还没有发过帖子哦～去论坛逛逛吧</div></div>'}
  else{postsTab.innerHTML=allPosts.map(p=>{const cn=catValue[p.category]||'其他';const cc=catColors[cn]||'#999';return`<div class="post-item" onclick="location.href='post.html?id=${p.id}'"><span class="cat-tag" style="background:${cc}">${cn}</span><div class="title">${esc(p.title)}</div><div class="meta"><span>👍 ${p.likes||0}</span><span>${timeAgo(p.created_at)}</span></div></div>`}).join('')}
  const replies=repliesRes.data||[];
  const repliesTab=document.getElementById('repliesTab');
  if(!replies.length){repliesTab.innerHTML='<div class="empty-state"><div class="icon">🤫</div><div class="text">还没有回复过任何帖子</div></div>'}
  else{repliesTab.innerHTML=replies.map(r=>{const post=allPosts.find(p=>p.id===r.post_id);const title=post?esc(post.title):'帖子已删除';return`<div class="reply-item"><div class="reply-to">回复了 <a href="post.html?id=${r.post_id}">${title}</a></div><div class="content">${esc(r.content)}</div><div class="meta">${timeAgo(r.created_at)}</div></div>`}).join('')}

  // 管理员面板
  if(currentUser.role==='admin'){
    document.getElementById('adminTab').style.display='flex';
    const{data:users}=await sb.from('users').select('*').order('created_at',{ascending:false});
    const adminContent=document.getElementById('adminTabContent');
    if(!users||!users.length){adminContent.innerHTML='<div class="empty-state"><div class="icon">👤</div><div class="text">暂无用户</div></div>'}
    else{adminContent.innerHTML=users.map(u=>`<div class="reply-item" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:120px">
        <div style="font-weight:600;color:#333;font-size:14px">${esc(u.nickname||u.username)} <span style="font-size:12px;color:#999">(${esc(u.username)})</span></div>
      </div>
      <span class="role-tag role-${u.role||'student'}">${roleLabel[u.role]||'学生'}</span>
      <span style="font-size:12px;padding:2px 8px;border-radius:10px;${u.is_banned?'background:#ffe0e0;color:#e74c3c':'background:#e8f5e9;color:#27ae60'}">${u.is_banned?'🔒 已封禁':'✅ 正常'}</span>
      ${u.username!==currentUser.username?`<button onclick="toggleBan('${esc(u.username)}',${!u.is_banned})" style="background:${u.is_banned?'#27ae60':'#e74c3c'};color:#fff;border:none;padding:4px 12px;border-radius:12px;font-size:12px;cursor:pointer">${u.is_banned?'🔓 解封':'🔒 封号'}</button>`:''}
    </div>`).join('')}
  }
}

function logout(){sessionStorage.clear();location.href='index.html'}
function switchTab(tab,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));if(el)el.classList.add('active');document.getElementById('postsTab').style.display=tab==='posts'?'flex':'none';document.getElementById('repliesTab').style.display=tab==='replies'?'flex':'none';document.getElementById('adminTabContent').style.display=tab==='admin'?'flex':'none'}
function toggleEdit(){const f=document.getElementById('editForm');const b=document.getElementById('editBtn');f.classList.toggle('show');b.textContent=f.classList.contains('show')?'✕ 取消':'✏️ 编辑资料'}

async function saveProfile(){
  const nn=document.getElementById('editNickname').value.trim();
  const gd=document.getElementById('editGender').value;
  if(!nn){alert('昵称不能为空');return}
  document.getElementById('saveBtn').disabled=true;
  const{error}=await sb.from('users').update({nickname:nn,gender:gd}).eq('username',currentUser.username);
  document.getElementById('saveBtn').disabled=false;
  if(error){alert('保存失败：'+error.message);return}
  currentUser.nickname=nn;
  sessionStorage.setItem('currentUser',JSON.stringify(currentUser));
  toggleEdit();
  await loadProfile();
}

async function toggleBan(username,ban){
  if(!confirm((ban?'封禁':'解封')+'用户 '+username+' ？'))return;
  const{error}=await sb.from('users').update({is_banned:ban}).eq('username',username);
  if(error){alert('操作失败');return}
  await loadProfile();
}

// 头像相关
function openAvatarModal(){
  selectedFile=null;
  document.getElementById('fileInput').value='';
  document.getElementById('uploadBtn').disabled=true;
  document.getElementById('uploadProgress').style.display='none';
  // 显示当前头像
  const preview=document.getElementById('avatarPreview');
  if(userData&&(userData.avatar_data||userData.avatar_url)){
    preview.innerHTML=`<img src="${esc(userData.avatar_data||userData.avatar_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    const nn=userData?(userData.nickname||currentUser.username):currentUser.username;
    preview.textContent=nn.charAt(0).toUpperCase();
    preview.style.background='linear-gradient(135deg,#667eea,#764ba2)';
    preview.style.color='#fff';
    preview.style.fontSize='40px';
    preview.style.fontWeight='700';
    preview.style.display='flex';
    preview.style.alignItems='center';
    preview.style.justifyContent='center';
  }
  document.getElementById('avatarModal').classList.add('active');
}

function closeAvatarModal(){
  document.getElementById('avatarModal').classList.remove('active');
  selectedFile=null;
}

function previewAvatar(input){
  const file=input.files[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){alert('请选择图片文件');return}
  if(file.size>10*1024*1024){alert('图片大小不能超过10MB');return}
  selectedFile=file;
  const reader=new FileReader();
  reader.onload=function(e){
    const preview=document.getElementById('avatarPreview');
    preview.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    document.getElementById('uploadBtn').disabled=false;
  };
  reader.readAsDataURL(file);
}

async function uploadAvatar(){
  if(!selectedFile)return;
  document.getElementById('uploadBtn').disabled=true;
  document.getElementById('uploadProgress').style.display='block';
  document.getElementById('progressBar').style.width='20%';

  try {
    var reader=new FileReader();
    var base64=await new Promise(function(resolve,reject){
      reader.onload=function(e){resolve(e.target.result)};
      reader.onerror=reject;
      reader.readAsDataURL(selectedFile);
    });

    document.getElementById('progressBar').style.width='70%';

    var updateRes=await sb.from('users').update({avatar_data:base64}).eq('username',currentUser.username);
    if(updateRes.error)throw new Error('保存头像失败：'+updateRes.error.message);

    document.getElementById('progressBar').style.width='100%';
    userData.avatar_data=base64;
    closeAvatarModal();
    renderAvatar();
    alert('头像更换成功！');
  } catch(err){
    document.getElementById('uploadBtn').disabled=false;
    document.getElementById('uploadProgress').style.display='none';
    alert(err.message||'上传失败，请重试');
  }
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';if(s<2592000)return Math.floor(s/86400)+'天前';return new Date(d).toLocaleDateString('zh-CN')}
  </script>
