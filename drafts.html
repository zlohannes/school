<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>草稿箱 - 鹿城学院论坛</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0b0f14;--card:#121821;--muted:#9fb2c3;--text:#e9f0f6;--acc:#4cc9f0;--purple:#a855f7}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .navbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(11,15,20,0.8);border-bottom:1px solid rgba(255,255,255,0.06)}
    .nav-inner{max-width:800px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px}
    .nav-logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none}
    .nav-logo img{height:24px}
    .nav-links{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-link{color:var(--muted);padding:6px 12px;border-radius:6px;font-size:14px;text-decoration:none}
    .nav-link:hover,.nav-link.active{color:var(--text);background:rgba(255,255,255,0.06)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text);border-radius:8px;font-size:13px;cursor:pointer}
    .container{max-width:800px;margin:20px auto;padding:0 16px}
    .page-title{font-size:20px;font-weight:600;margin-bottom:16px}
    .draft-list{display:flex;flex-direction:column;gap:10px}
    .draft-item{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s}
    .draft-item:hover{border-color:rgba(76,201,240,0.3)}
    .draft-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .draft-title{font-weight:600;font-size:15px}
    .draft-time{font-size:12px;color:var(--muted)}
    .draft-preview{color:var(--muted);font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
    .draft-meta{display:flex;gap:12px;align-items:center}
    .draft-category{font-size:12px;padding:2px 10px;border-radius:10px;font-weight:600}
    .cat-learning{background:rgba(76,175,80,0.2);color:#4CAF50}
    .cat-campus{background:rgba(33,150,243,0.2);color:#2196F3}
    .cat-trade{background:rgba(255,152,0,0.2);color:#FF9800}
    .cat-job{background:rgba(156,39,176,0.2);color:#9C27B0}
    .cat-chat{background:rgba(255,87,34,0.2);color:#FF5722}
    .cat-notice{background:rgba(244,67,54,0.2);color:#f44336}
    .draft-actions{display:flex;gap:8px;margin-top:10px}
    .btn-small{padding:6px 14px;font-size:12px}
    .btn-primary{background:linear-gradient(135deg,var(--acc),var(--purple));border:none}
    .btn-danger{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#ef4444}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:10px}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="forum.html" class="nav-logo"><img src="https://www.wzvtc.cn/favicon.ico"> 鹿城学院论坛</a>
      <div class="nav-links">
        <a href="forum.html" class="nav-link">首页</a>
        <a href="drafts.html" class="nav-link active">📝 草稿箱</a>
        <a href="profile.html" class="nav-link">我的主页</a>
        <button class="btn" onclick="history.back()">← 返回</button>
      </div>
    </div>
  </nav>
  
  <div class="container">
    <div class="page-title">📝 草稿箱</div>
    <div class="draft-list" id="draftList"></div>
  </div>

  <script>
(function(){
  var catNames={learning:'学习交流',campus:'校园生活',trade:'二手交易',job:'游戏搭子',chat:'闲聊灌水',notice:'公告通知'};

  function $(id){return document.getElementById(id)}
  
  function timeAgo(d){
    var s=Math.floor((Date.now()-new Date(d))/1000);
    if(s<60)return'刚刚';
    if(s<3600)return Math.floor(s/60)+'分钟前';
    if(s<86400)return Math.floor(s/3600)+'小时前';
    return new Date(d).toLocaleDateString('zh-CN');
  }

  function loadDrafts(){
    var drafts=JSON.parse(localStorage.getItem('postDrafts')||'[]');
    var list=$('draftList');
    
    if(drafts.length===0){
      list.innerHTML='<div class="empty"><div class="empty-icon">📝</div><div>暂无草稿</div><div style="font-size:13px;margin-top:8px">在发帖时点击"保存草稿"即可保存</div></div>';
      return;
    }
    
    list.innerHTML=drafts.map(function(d,i){
      var catClass='cat-'+(d.category||'chat');
      var catName=catNames[d.category]||'未分类';
      return'<div class="draft-item">'+
        '<div class="draft-header">'+
          '<div class="draft-title">'+(d.title||'无标题')+'</div>'+
          '<div class="draft-time">'+timeAgo(d.saved_at)+'</div>'+
        '</div>'+
        '<div class="draft-preview">'+(d.content||'无内容')+'</div>'+
        '<div class="draft-meta">'+
          '<span class="draft-category '+catClass+'">'+catName+'</span>'+
          (d.is_anonymous?'<span style="font-size:12px;color:var(--purple)">🎭 匿名</span>':'')+
        '</div>'+
        '<div class="draft-actions">'+
          '<button class="btn btn-primary btn-small" onclick="editDraft('+i+')">✏️ 继续编辑</button>'+
          '<button class="btn btn-danger btn-small" onclick="deleteDraft('+i+')">🗑 删除</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  window.editDraft=function(index){
    var drafts=JSON.parse(localStorage.getItem('postDrafts')||'[]');
    var draft=drafts[index];
    if(!draft)return;
    
    // 保存到sessionStorage，让forum.html读取
    sessionStorage.setItem('editingDraft',JSON.stringify(draft));
    sessionStorage.setItem('editingDraftIndex',index);
    window.location.href='forum.html?action=editDraft';
  };

  window.deleteDraft=function(index){
    if(!confirm('确定删除该草稿？'))return;
    var drafts=JSON.parse(localStorage.getItem('postDrafts')||'[]');
    drafts.splice(index,1);
    localStorage.setItem('postDrafts',JSON.stringify(drafts));
    loadDrafts();
  };

  // 检查登录
  if(!sessionStorage.getItem('currentUser')){
    window.location.href='index.html';
  } else {
    loadDrafts();
  }
})();
  </script>
</body>
</html>
