<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0b0f14;--card:#121821;--muted:#9fb2c3;--text:#e9f0f6;--acc:#4cc9f0;--danger:#ff6b6b;--purple:#a855f7}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{color:var(--acc);text-decoration:none}
    
    /* 导航栏 */
    .navbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(11,15,20,0.8);border-bottom:1px solid rgba(255,255,255,0.06)}
    .nav-inner{max-width:1080px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .nav-logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
    .nav-logo img{height:24px}
    .nav-links{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-link{color:var(--muted);padding:6px 12px;border-radius:6px;font-size:14px;transition:all 0.2s}
    .nav-link:hover,.nav-link.active{color:var(--text);background:rgba(255,255,255,0.06)}
    .user-info{display:flex;align-items:center;gap:8px}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .role-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
    .role-student{background:rgba(76,201,240,0.2);color:var(--acc)}
    .role-teacher{background:rgba(34,197,94,0.2);color:#22c55e}
    .role-admin{background:rgba(239,68,68,0.2);color:#ef4444}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text);border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
    .btn:hover{border-color:var(--acc);background:rgba(76,201,240,0.1)}
    .btn-primary{background:linear-gradient(135deg,#0e3b5a,#0e1e2e);border-color:rgba(76,201,240,0.35)}
    .btn-danger{border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.1)}
    
    /* 主布局 */
    .main{max-width:1080px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns:1fr 280px;gap:16px}
    @media(max-width:900px){.main{grid-template-columns:1fr}}
    
    /* 卡片 */
    .card{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden}
    .card-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:600}
    .card-body{padding:16px}
    
    /* 帖子列表 */
    .toolbar{padding:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.06)}
    .toolbar select,.toolbar input{background:#1a2332;color:var(--text);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 12px;outline:none}
    .toolbar input:focus,.toolbar select:focus{border-color:var(--acc)}
    .toolbar select option{background:#1a2332;color:var(--text)}
    .toolbar .grow{flex:1;min-width:150px}
    
    .post-list{display:flex;flex-direction:column}
    .post-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:background 0.2s;position:relative}
    .post-item:hover{background:rgba(255,255,255,0.02)}
    .post-item:last-child{border-bottom:none}
    .post-title{font-size:15px;font-weight:600;margin-bottom:6px}
    .post-preview{color:var(--muted);font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
    .post-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
    .category-tag{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}
    .cat-learning{background:rgba(76,175,80,0.2);color:#4CAF50}
    .cat-campus{background:rgba(33,150,243,0.2);color:#2196F3}
    .cat-trade{background:rgba(255,152,0,0.2);color:#FF9800}
    .cat-job{background:rgba(156,39,176,0.2);color:#9C27B0}
    .cat-chat{background:rgba(255,87,34,0.2);color:#FF5722}
    .cat-notice{background:rgba(244,67,54,0.2);color:#f44336}
    
    .admin-del{position:absolute;top:10px;right:12px;background:rgba(239,68,68,0.15);color:#ef4444;border:none;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer}
    .admin-del:hover{background:rgba(239,68,68,0.3)}
    
    /* 空状态 */
    .empty{padding:40px 20px;text-align:center;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:12px}
    
    /* 分页 */
    .pagination{display:flex;justify-content:center;gap:8px;padding:12px}
    .page-btn{padding:6px 12px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:13px}
    .page-btn:hover:not(:disabled){border-color:var(--acc);color:var(--text)}
    .page-btn.active{border-color:var(--acc);color:var(--acc)}
    .page-btn:disabled{opacity:0.4;cursor:not-allowed}
    
    /* 公告 */
    .announce-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
    .announce-item:last-child{border-bottom:none}
    .announce-item p{margin-bottom:8px;font-size:13px}
    .contact{color:var(--acc);font-weight:600}
    
    /* 发布按钮 */
    .fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:linear-gradient(135deg,var(--acc),var(--purple));color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(76,201,240,0.3);z-index:99;transition:transform 0.2s}
    .fab:hover{transform:scale(1.1)}
    
    /* 弹窗 */
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
    .modal-overlay.active{display:flex}
    .modal{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:14px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
    .modal-header{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-size:16px;font-weight:600}
    .modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
    .modal-body{padding:16px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:#1a2332;color:var(--text);border:1px solid rgba(255,255,255,0.12);border-radius:8px;font-size:14px;font-family:inherit}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--acc);outline:none}
    .form-group select option{background:#1a2332;color:var(--text)}
    .form-group textarea{min-height:100px;resize:vertical}
    .modal-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:10px;justify-content:flex-end}
    
    /* 加载 */
    .loading{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:16px}
    .loading.hidden{display:none}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading .msg{color:var(--muted);font-size:14px}
    
    /* 移动端菜单 */
    .mobile-menu{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
    @media(max-width:768px){
      .mobile-menu{display:block}
      .nav-links{display:none;width:100%;flex-direction:column;align-items:stretch;padding-top:12px}
      .nav-links.active{display:flex}
    }
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div><div class="msg">加载中...</div></div>
  
  <nav class="navbar">
    <div class="nav-inner">
      <a href="forum.html" class="nav-logo"><img src="https://www.wzvtc.cn/favicon.ico"> 鹿城学院论坛</a>
      <button class="mobile-menu" id="mobileMenuBtn">☰</button>
      <div class="nav-links" id="navLinks">
        <a href="forum.html" class="nav-link active">首页</a>
        <a href="profile.html" class="nav-link">我的主页</a>
        <div class="user-info" id="userInfo"></div>
        <button class="btn" id="logoutBtn">退出</button>
      </div>
    </div>
  </nav>
  
  <main class="main">
    <section class="card">
      <div class="toolbar">
        <select id="categorySelect">
          <option value="">全部分类</option>
          <option value="learning">📚 学习交流</option>
          <option value="campus">🏠 校园生活</option>
          <option value="trade">🛒 二手交易</option>
          <option value="job">🎮 游戏搭子</option>
          <option value="chat">💬 闲聊灌水</option>
          <option value="notice">📢 公告通知</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索帖子..." class="grow">
        <select id="sortSelect">
          <option value="latest">最新</option>
          <option value="hot">最热</option>
        </select>
      </div>
      <div class="post-list" id="postList"></div>
      <div class="pagination" id="pagination"></div>
    </section>
    
    <aside class="card">
      <div class="card-header">📢 公告</div>
      <div class="card-body">
        <div class="announce-item">
          <p>⚠️ 网站开发属于开始阶段，连接的是海外服务器，网络波动纯属正常，请耐心等待。</p>
          <p>如有反馈和建议，请联系：</p>
          <p class="contact">📞 13587769094（微信同号）</p>
        </div>
      </div>
    </aside>
  </main>
  
  <button class="fab" id="fabBtn">+</button>
  
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">发布新帖</span>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label>标题 *</label><input type="text" id="postTitle" placeholder="请输入标题"></div>
        <div class="form-group"><label>分类 *</label>
          <select id="postCategory">
            <option value="">请选择</option>
            <option value="learning">📚 学习交流</option>
            <option value="campus">🏠 校园生活</option>
            <option value="trade">🛒 二手交易</option>
            <option value="job">🎮 游戏搭子</option>
            <option value="chat">💬 闲聊灌水</option>
            <option value="notice">📢 公告通知</option>
          </select>
        </div>
        <div class="form-group"><label>内容 *</label><textarea id="postContent" placeholder="请输入内容"></textarea></div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px">
          <input type="checkbox" id="postAnonymous" style="width:18px;height:18px;accent-color:var(--acc)">
          <label for="postAnonymous" style="margin:0;font-weight:normal;cursor:pointer">🎭 匿名发帖（作者信息将隐藏）</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="submitBtn">发布</button>
      </div>
    </div>
  </div>

  <script>
(function(){
  var SB_URL='https://tsxnnzcteavcpowsbaye.supabase.co';
  var SB_KEY='sb_publishable_SHiGnxlUonmmOFKytrt-Lg_8DXAWJJl';
  var sb=window.supabase.createClient(SB_URL,SB_KEY);
  var PER_PAGE=10;
  var catNames={learning:'学习交流',campus:'校园生活',trade:'二手交易',job:'游戏搭子',chat:'闲聊灌水',notice:'公告通知'};
  var roleNames={student:'学生',teacher:'老师',admin:'管理员'};
  
  var currentUser=null,userData=null,allPosts=[],replyCounts={};
  var currentCategory='',currentSort='latest',currentPage=1,searchKeyword='',searchTimer=null;

  function $(id){return document.getElementById(id)}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
  function timeAgo(d){var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';if(s<2592000)return Math.floor(s/86400)+'天前';return new Date(d).toLocaleDateString('zh-CN')}

  function showLoading(){$('loading').classList.remove('hidden')}
  function hideLoading(){$('loading').classList.add('hidden')}

  function renderUserInfo(){
    var role=currentUser.role||'student';
    var rt=roleNames[role]||'学生';
    var nn=(userData&&userData.nickname)||currentUser.nickname||'?';
    var av=(userData&&(userData.avatar_data||userData.avatar_url))||'';
    var avatarHtml=av?'<img src="'+esc(av)+'">':esc(nn.charAt(0).toUpperCase());
    $('userInfo').innerHTML='<div class="avatar">'+avatarHtml+'</div><span>'+esc(nn)+'</span><span class="role-tag role-'+esc(role)+'">'+esc(rt)+'</span>';
  }

  async function init(){
    var s=sessionStorage.getItem('currentUser');
    if(!s){window.location.href='index.html';return}
    currentUser=JSON.parse(s);
    showLoading();
    try{
      var userRes=await sb.from('users').select('*').eq('username',currentUser.username).maybeSingle();
      var postsRes=await sb.from('posts').select('*').order('created_at',{ascending:false});
      userData=userRes.data;
      allPosts=postsRes.data||[];
      if(allPosts.length>0){
        var ids=allPosts.map(function(p){return p.id});
        var repRes=await sb.from('replies').select('post_id').in('post_id',ids);
        (repRes.data||[]).forEach(function(r){replyCounts[r.post_id]=(replyCounts[r.post_id]||0)+1});
      }
    }catch(e){alert('加载失败：'+e.message)}
    hideLoading();
    renderUserInfo();
    filterAndRender();
  }

  function filterAndRender(){
    var filtered=allPosts.filter(function(p){
      if(p.is_deleted)return false;
      if(currentCategory&&p.category!==currentCategory)return false;
      if(searchKeyword&&p.title.toLowerCase().indexOf(searchKeyword.toLowerCase())===-1)return false;
      return true;
    });
    filtered.sort(function(a,b){
      if(currentSort==='latest')return new Date(b.created_at)-new Date(a.created_at);
      return (replyCounts[b.id]||0)-(replyCounts[a.id]||0);
    });
    renderPosts(filtered);
  }

  function renderPosts(posts){
    var c=$('postList');
    if(!posts.length){
      c.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>暂无帖子，抢个沙发？</div></div>';
      $('pagination').innerHTML='';
      return;
    }
    var total=Math.ceil(posts.length/PER_PAGE);
    var start=(currentPage-1)*PER_PAGE;
    var page=posts.slice(start,start+PER_PAGE);
    var isAdmin=currentUser.role==='admin';
    
    c.innerHTML=page.map(function(p){
      var cn=catNames[p.category]||'其他';
      var canDelete=isAdmin||(p.author===currentUser.username);
      var delBtn=canDelete?'<button class="admin-del" onclick="event.stopPropagation();doDeletePost('+p.id+')">🗑 删除</button>':'';
      return'<div class="post-item" onclick="gotoPost('+p.id+')">'+delBtn+
        '<div class="post-title">'+esc(p.title)+'</div>'+
        '<div class="post-preview">'+esc(p.content)+'</div>'+
        '<div class="post-meta"><span class="category-tag cat-'+esc(p.category)+'">'+esc(cn)+'</span>'+
        '<span>👤 '+esc(p.author_nickname||p.author)+'</span>'+
        '<span>⏱ '+timeAgo(p.created_at)+'</span>'+
        '<span>💬 '+(replyCounts[p.id]||0)+'</span>'+
        '<span>👍 '+(p.likes||0)+'</span></div></div>';
    }).join('');
    
    // 分页
    var h='';
    if(total>1){
      h+='<button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>上一页</button>';
      for(var i=1;i<=total;i++){
        if(i===1||i===total||(i>=currentPage-1&&i<=currentPage+1)){
          h+='<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
        }else if(i===currentPage-2||i===currentPage+2){
          h+='<span style="padding:6px;color:var(--muted)">...</span>';
        }
      }
      h+='<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===total?'disabled':'')+'>下一页</button>';
    }
    $('pagination').innerHTML=h;
  }

  window.gotoPost=function(id){window.location.href='post.html?id='+id};
  window.goPage=function(p){currentPage=p;filterAndRender();window.scrollTo({top:0,behavior:'smooth'})};
  window.doDeletePost=async function(id){
    if(!confirm('确定删除？'))return;
    var res=await sb.from('posts').update({is_deleted:true}).eq('id',id);
    if(res.error){alert('删除失败');return}
    allPosts=allPosts.map(function(p){return p.id===id?Object.assign({},p,{is_deleted:true}):p});
    filterAndRender();
  };

  // 事件绑定
  $('mobileMenuBtn').onclick=function(){$('navLinks').classList.toggle('active')};
  $('logoutBtn').onclick=function(){sessionStorage.clear();window.location.href='index.html'};
  $('fabBtn').onclick=function(){$('postModal').classList.add('active');$('postTitle').value='';$('postCategory').value='';$('postContent').value=''};
  $('modalClose').onclick=$('modalCancel').onclick=function(){$('postModal').classList.remove('active')};
  $('categorySelect').onchange=function(){currentCategory=this.value;currentPage=1;filterAndRender()};
  $('sortSelect').onchange=function(){currentSort=this.value;currentPage=1;filterAndRender()};
  $('searchInput').oninput=function(){searchKeyword=this.value;clearTimeout(searchTimer);searchTimer=setTimeout(function(){currentPage=1;filterAndRender()},400)};
  
  $('submitBtn').onclick=async function(){
    var title=$('postTitle').value.trim();
    var cat=$('postCategory').value;
    var content=$('postContent').value.trim();
    var isAnonymous=$('postAnonymous').checked;
    if(!title||!cat||!content){alert('请填写完整');return}
    $('submitBtn').disabled=true;
    var postData={
      title:title,
      category:cat,
      content:content,
      author:currentUser.username,
      author_nickname:isAnonymous?'匿名用户':currentUser.nickname,
      is_anonymous:isAnonymous
    };
    var res=await sb.from('posts').insert(postData);
    $('submitBtn').disabled=false;
    if(res.error){alert('发布失败：'+res.error.message);return}
    $('postModal').classList.remove('active');
    $('postAnonymous').checked=false;
    var postsRes=await sb.from('posts').select('*').order('created_at',{ascending:false});
    allPosts=postsRes.data||[];
    currentPage=1;filterAndRender();
  };

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();
  </script>
</body>
</html>
