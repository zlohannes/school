<!doctype html>
<html lang="zh-CN">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>校园轻论坛 · GitHub Pages + Supabase（纯前端）</title>
 <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
 <style>
 :root{--bg:#0b0f14;--card:#121821;--muted:#9fb2c3;--text:#e9f0f6;--acc:#4cc9f0;--danger:#ff6b6b}
 *{box-sizing:border-box}
 html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,PingFang SC,Noto Sans CJK SC,Microsoft YaHei,Arial,sans-serif}
 a{color:var(--acc);text-decoration:none}
 header{position:sticky;top:0;z-index:10;backdrop-filter:blur(10px);background:rgba(11,15,20,.6);border-bottom:1px solid rgba(255,255,255,.06)}
 .wrap{max-width:1080px;margin:0 auto;padding:16px}
 .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
 .grow{flex:11 auto}
 .btn{display:inline-flex;align-items:center;gap:6px;padding:8px12px;border:1px solid rgba(255,255,255,.12);background:#0e1420;color:var(--text);border-radius:8px;cursor:pointer;transition:.2s}
 .btn:hover{border-color:var(--acc);box-shadow:0003px rgba(76,201,240,.15) inset}
 .btn.primary{background:linear-gradient(135deg,#0e3b5a,#0e1e2e);border-color:rgba(76,201,240,.35)}
 .btn.danger{border-color:rgba(255,107,107,.35);background:#2a0e12}
 input,select,textarea{background:#0e1420;color:var(--text);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px10px;outline:none}
 input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0003px rgba(76,201,240,.15)}
 main{max-width:1080px;margin:18px auto;padding:016px;display:grid;grid-template-columns:1fr300px;gap:16px}
 @media (max-width:900px){main{grid-template-columns:1fr}}
 .card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
 .card h3{margin:0;padding:12px14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:16px}
 .list{display:flex;flex-direction:column}
 .item{padding:12px14px;border-bottom:1px solid rgba(255,255,255,.06);display:grid;grid-template-columns:1fr auto;gap:8px}
 .item:last-child{border-bottom:0}
 .meta{color:var(--muted);font-size:12px}
 .muted{color:var(--muted)}
 .toolbar{padding:12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);flex-wrap:wrap}
 .empty{padding:18px;color:var(--muted)}
 .pill{padding:2px8px;border-radius:999px;background:#0f2233;border:1px solid rgba(76,201,240,.25);color:#bfe9fb;font-size:12px}
 .right{text-align:right}
 .paging{display:flex;justify-content:center;gap:8px;padding:12px}
 dialog{border:none;border-radius:12px;padding:0;max-width:720px;width:calc(100% -40px)}
 dialog::backdrop{background:rgba(0,0,0,.4)}
 .sheet{background:var(--card);color:var(--text);padding:16px;border:1px solid rgba(255,255,255,.08);border-radius:12px}
 .sheet .row{margin:10px0}
 small.hint{color:var(--muted)}
 </style>
</head>
<body>
 <header>
 <div class="wrap row">
 <div class="grow"><strong>校园轻论坛</strong> · GitHub Pages + Supabase（纯前端）</div>
 <a href="./index.html" class="btn">返回登录</a>
 <button id="settingsBtn" class="btn">设置</button>
 <button id="newPostBtn" class="btn primary">发布新帖</button>
 </div>
 </header>

 <main>
 <section class="card" id="postCard">
 <div class="toolbar">
 <select id="categorySelect"></select>
 <input id="search" placeholder="搜索标题/作者 (支持中文)" class="grow" />
 <select id="sortSelect">
 <option value="latest">最新</option>
 </select>
 <span id="count" class="pill">0 帖</span>
 </div>
 <div id="postList" class="list"></div>
 <div class="paging">
 <button id="prevPg" class="btn">上一页</button>
 <span id="pgInfo" class="muted"></span>
 <button id="nextPg" class="btn">下一页</button>
 </div>
 </section>

 <aside class="card">
 <h3>公告</h3>
 <div class="wrap">
 <p class="muted">部署于 GitHub Pages，数据由 Supabase 提供。匿名读，受限写。</p>
 <p class="muted">发布频率限制：同设备30 秒一次。</p>
 </div>
 </aside>
 </main>

 <dialog id="postDialog">
 <form method="dialog" class="sheet" id="postForm">
 <h3 style="margin:008px">发布新帖</h3>
 <div class="row">
 <label class="grow">标题
 <input id="title" required minlength="4" placeholder="请输入帖子标题 (≥4 字)" />
 </label>
 </div>
 <div class="row">
 <label class="grow">内容
 <textarea id="content" rows="6" required minlength="15" placeholder="详细描述一下吧 (≥15 字)"></textarea>
 </label>
 </div>
 <div class="row">
 <label class="grow">作者
 <input id="author" required placeholder="怎么称呼你" />
 </label>
 </div>
 <div class="row">
 <label>分类
 <select id="categorySelectPost"></select>
 </label>
 <span class="grow"></span>
 <button type="submit" class="btn primary" id="submitPostBtn">提交</button>
 <button type="button" class="btn" id="cancelPostBtn">取消</button>
 </div>
 <small class="hint" id="postHint"></small>
 </form>
 </dialog>

 <dialog id="settingsDialog">
 <form method="dialog" class="sheet" id="settingsForm">
 <h3 style="margin:008px">连接 Supabase</h3>
 <div class="row">
 <label class="grow">SUPABASE_URL
 <input id="sbUrl" placeholder="https://xxxx.supabase.co" />
 </label>
 </div>
 <div class="row">
 <label class="grow">SUPABASE_ANON_KEY
 <input id="sbAnon" placeholder="eyJhbGciOiJI...（anon 公钥）" />
 </label>
 </div>
 <div class="row">
 <button class="btn primary" id="saveSettings">保存</button>
 <button class="btn" value="cancel">关闭</button>
 </div>
 <small class="hint">说明：
1) 支持从 window.SUPABASE_URL / window.SUPABASE_ANON_KEY 自动读取
2) 或在此处保存到 localStorage（不会提交到仓库）
 </small>
 </form>
 </dialog>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="./config.js"></script>
 <script>
 // 工具
 const $ = s => document.querySelector(s);
 const $$ = s => Array.from(document.querySelectorAll(s));
 const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
 const sleep = ms => new Promise(r => setTimeout(r, ms));

 // 配置优先级：window -> localStorage -> 弹窗
 function getConfig(){
 const u = window.SUPABASE_URL || localStorage.getItem('SUPABASE_URL');
 const k = window.SUPABASE_ANON_KEY || localStorage.getItem('SUPABASE_ANON_KEY');
 return { url: u, key: k };
 }
 function ensureConfig(){
 const {url,key} = getConfig();
 if (!url || !key) {
 $('#sbUrl').value = url || '';
 $('#sbAnon').value = key || '';
 $('#settingsDialog').showModal();
 throw new Error('尚未配置 Supabase连接');
 }
 return { url, key };
 }

 // 状态
 const state = { page:1, size:10, total:0, lastPostTs:0, q:'', cat:'', posts:[], categories:[] };

 // DOM refs
 const postList = $('#postList');
 const categorySelect = $('#categorySelect');
 const categorySelectPost = $('#categorySelectPost');
 const sortSelect = $('#sortSelect');
 const searchInput = $('#search');
 const countEl = $('#count');
 const pgInfo = $('#pgInfo');

 // Supabase 客户端（懒初始化）
 let sb = null;
 function client(){
 if (!sb){
 const {url,key} = ensureConfig();
 sb = supabase.createClient(url, key);
 }
 return sb;
 }

 // 设置面板
 $('#settingsBtn').addEventListener('click', () => {
 const {url,key} = getConfig();
 $('#sbUrl').value = url || '';
 $('#sbAnon').value = key || '';
 $('#settingsDialog').showModal();
 });
 $('#saveSettings').addEventListener('click', (e) => {
 e.preventDefault();
 const u = $('#sbUrl').value.trim();
 const k = $('#sbAnon').value.trim();
 if (!u || !k) return;
 localStorage.setItem('SUPABASE_URL', u);
 localStorage.setItem('SUPABASE_ANON_KEY', k);
 $('#settingsDialog').close();
 //重新加载数据
 sb = null;
 init();
 });

 // 数据加载
 async function loadCategories(){
 const c = client();
 const { data, error } = await c.from('categories').select('name').order('name', { ascending: true });
 if (error) throw error;
 state.categories = data || [];
 const opts = ['<option value="">全部分类</option>'].concat(state.categories.map(x => `<option value="${esc(x.name)}">${esc(x.name)}</option>`)).join('');
 categorySelect.innerHTML = opts;
 categorySelectPost.innerHTML = state.categories.map(x => `<option value="${esc(x.name)}">${esc(x.name)}</option>`).join('');
 }

 async function loadPosts(){
 const c = client();
 const from = (state.page -1) * state.size;
 const to = from + state.size -1;
 let q = c.from('posts').select('*', { count: 'exact' }).order('created_at', { ascending: false });
 if (state.cat) q = q.eq('category', state.cat);
 if (state.q){
 const like = `%${state.q}%`;
 q = q.or(`title.ilike.${like},author.ilike.${like}`);
 }
 const { data, error, count } = await q.range(from, to);
 if (error) throw error;
 state.posts = data || [];
 state.total = count ||0;
 renderList();
 }

 function renderList(){
 countEl.textContent = `${state.total} 帖`;
 if (!state.total && state.page ===1){
 postList.innerHTML = `<div class="empty">还没有帖子。抢个沙发？点右上角“发布新帖”。</div>`;
 pgInfo.textContent = '';
 return;
 }
 postList.innerHTML = state.posts.map(p => `
 <div class="item">
 <div>
 <div style="font-weight:600;font-size:15px;margin-bottom:6px;">${esc(p.title)}</div>
 <div class="meta">分类：${esc(p.category || '')} · 作者：${esc(p.author)} · 时间：${esc(p.created_at || '')}</div>
 </div>
 <div class="right">
 <button class="btn" onclick="showPost(${Number(p.id)})">查看</button>
 </div>
 </div>
 `).join('');
 const pages = Math.max(1, Math.ceil(state.total / state.size));
 pgInfo.textContent = `第 ${state.page} / ${pages} 页`;
 $('#prevPg').disabled = state.page <=1;
 $('#nextPg').disabled = state.page >= pages;
 }

 async function showPost(id){
 try {
 const c = client();
 const { data: post, error: e1 } = await c.from('posts').select('*').eq('id', id).single();
 if (e1) throw e1;
 const { data: replies, error: e2 } = await c.from('replies').select('*').eq('post_id', id).order('created_at', { ascending: true });
 if (e2) throw e2;
 const dlg = document.createElement('dialog');
 dlg.innerHTML = `
 <form method="dialog" class="sheet">
 <h3 style="margin:008px">${esc(post.title)}</h3>
 <div class="meta" style="margin-bottom:10px">分类：${esc(post.category || '')} · 作者：${esc(post.author)} · 时间：${esc(post.created_at || '')}</div>
 <div style="white-space:pre-wrap;margin-bottom:12px">${esc(post.content)}</div>
 <h4 style="margin:8px0">回复</h4>
 <div>${(replies||[]).map(r => `<div style='border-top:1px solid rgba(255,255,255,.06);padding:8px0'><div class='meta'>${esc(r.author)} · ${esc(r.created_at || '')}</div><div style='white-space:pre-wrap'>${esc(r.content)}</div></div>`).join('')}</div>
 <div class="row" style="margin-top:12px">
 <input id="replyAuthor" placeholder="你的名字" required />
 <input id="replyContent" class="grow" placeholder="写个回复吧" required />
 <button class="btn primary">回复</button>
 <button class="btn" value="cancel">关闭</button>
 </div>
 <small class="hint" id="replyHint"></small>
 </form>`;
 document.body.appendChild(dlg);
 dlg.showModal();
 dlg.addEventListener('close', () => dlg.remove());
 dlg.querySelector('form').addEventListener('submit', async (e) => {
 e.preventDefault();
 const author = dlg.querySelector('#replyAuthor').value.trim();
 const content = dlg.querySelector('#replyContent').value.trim();
 if (!author || !content) return;
 try {
 const c = client();
 const { error } = await c.from('replies').insert({ post_id: id, author, content });
 if (error) throw error;
 dlg.querySelector('#replyHint').textContent = '已回复，刷新后可见';
 } catch (err) {
 dlg.querySelector('#replyHint').textContent = '回复失败：' + err.message;
 }
 });
 } catch (err) {
 alert('加载帖子失败：' + err.message);
 }
 }
 window.showPost = showPost;

 // 发布新帖
 const postDialog = $('#postDialog');
 $('#newPostBtn').addEventListener('click', () => postDialog.showModal());
 $('#cancelPostBtn').addEventListener('click', () => postDialog.close());
 $('#postForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 const now = Date.now();
 const cooldown =30 *1000;
 if (now - state.lastPostTs < cooldown) {
 const left = Math.ceil((cooldown - (now - state.lastPostTs)) /1000);
 $('#postHint').textContent = `发布太快啦，请 ${left}s 后再试`;
 return;
 }
 const title = $('#title').value.trim();
 const content = $('#content').value.trim();
 const author = $('#author').value.trim();
 const category = $('#categorySelectPost').value;
 if (title.length <4 || content.length <15) {
 $('#postHint').textContent = '标题≥4字，内容≥15字';
 return;
 }
 try {
 $('#submitPostBtn').disabled = true;
 $('#submitPostBtn').textContent = '提交中…';
 const c = client();
 const { error } = await c.from('posts').insert({ title, content, author, category });
 if (error) throw error;
 state.lastPostTs = now;
 $('#postHint').textContent = '发布成功！稍后自动刷新…';
 await sleep(600);
 postDialog.close();
 state.page =1;
 await loadPosts();
 } catch (err) {
 $('#postHint').textContent = '发布失败：' + err.message;
 } finally {
 $('#submitPostBtn').disabled = false;
 $('#submitPostBtn').textContent = '提交';
 }
 });

 //交互：分页/筛选/防抖
 $('#prevPg').addEventListener('click', () => { state.page = Math.max(1, state.page -1); loadPosts(); });
 $('#nextPg').addEventListener('click', () => { const pages = Math.max(1, Math.ceil(state.total / state.size)); state.page = Math.min(pages, state.page +1); loadPosts(); });
 categorySelect.addEventListener('change', () => { state.cat = categorySelect.value; state.page =1; loadPosts(); });
 sortSelect.addEventListener('change', () => { state.page =1; loadPosts(); }); //预留最热
 (function(){ let t=null; searchInput.addEventListener('input', () => { clearTimeout(t); t=setTimeout(() => { state.q = searchInput.value.trim(); state.page=1; loadPosts(); },250); }); })();

 // 初始化
 async function init(){
 try {
 client(); // 确保配置存在或触发设置弹窗
 await loadCategories();
 await loadPosts();
 } catch (err) {
 postList.innerHTML = `<div class='empty'>加载失败：${esc(err.message)}</div>`;
 }
 }
 init();
 </script>
</body>
</html>
