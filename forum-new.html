<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 校园交流社区</title>
  <meta name="description" content="鹿城学院论坛 - 温州职业技术学院学生交流平台">
  <meta name="author" content="鹿城学院">
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <style>
    :root{--bg:#0b0f14;--card:#121821;--muted:#9fb2c3;--text:#e9f0f6;--acc:#4cc9f0;--danger:#ff6b6b;--purple:#a855f7}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{color:var(--acc);text-decoration:none}
    
    /* 导航栏 */
    .navbar{position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);background:rgba(11,15,20,0.8);border-bottom:1px solid rgba(255,255,255,0.06)}
    .nav-inner{max-width:1080px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .nav-logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
    .nav-links{display:flex;align-items:center;gap:8px;margin-left:auto}
    .nav-link{color:var(--muted);padding:6px 12px;border-radius:6px;font-size:14px;transition:all 0.2s}
    .nav-link:hover,.nav-link.active{color:var(--text);background:rgba(255,255,255,0.06)}
    .user-info{display:flex;align-items:center;gap:8px}
    .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:var(--text);border-radius:8px;font-size:14px;cursor:pointer;transition:all 0.2s}
    .btn:hover{border-color:var(--acc);background:rgba(76,201,240,0.1)}
    
    /* 主布局 */
    .main{max-width:1080px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns:1fr 280px;gap:16px}
    @media(max-width:768px){.main{grid-template-columns:1fr}}
    
    /* 分类筛选 */
    .categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .category-tag{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);transition:all 0.2s}
    .category-tag:hover,.category-tag.active{background:rgba(76,201,240,0.2);border-color:var(--acc)}
    .category-tag.all{background:var(--acc);color:#000}
    
    /* 帖子卡片 */
    .card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;overflow:hidden}
    .card-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);font-weight:600;display:flex;justify-content:space-between;align-items:center}
    .post-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s}
    .post-item:hover{background:rgba(255,255,255,0.02)}
    .post-item.pinned{border-left:3px solid var(--acc)}
    .post-title{font-size:15px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .post-title .pin{color:var(--acc)}
    .post-preview{color:var(--muted);font-size:13px;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .post-meta{display:flex;gap:12px;font-size:12px;color:var(--muted)}
    .post-meta span{display:flex;align-items:center;gap:4px}
    
    /* 侧边栏 */
    .sidebar{display:flex;flex-direction:column;gap:16px}
    .sidebar-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px}
    .sidebar-card h3{font-size:14px;margin-bottom:12px;color:var(--muted)}
    .sidebar-btn{width:100%;padding:10px;margin-bottom:8px;text-align:center}
    
    /* Loading */
    .loading{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;font-size:18px}
    .loading.hidden{display:none}
    
    /* 空状态 */
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:16px}
  </style>
</head>
<body>
  <div class="loading" id="loading">正在加载...</div>
  
  <nav class="navbar">
    <div class="nav-inner">
      <a href="forum.html" class="nav-logo">🦌 鹿城学院论坛</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">登录</a>
        <div class="user-info" id="userInfo"></div>
      </div>
    </div>
  </nav>
  
  <main class="main">
    <div class="content">
      <div class="categories" id="categories"></div>
      <div class="card">
        <div class="card-header">
          <span>📢 帖子列表</span>
          <span id="postCount" style="color:var(--muted);font-weight:normal;font-size:13px"></span>
        </div>
        <div id="postList"></div>
      </div>
    </div>
    
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>操作</h3>
        <button class="btn sidebar-btn" onclick="window.location.href='index.html'">🔙 返回登录</button>
      </div>
    </aside>
  </main>

<script>
// 配置
const CATEGORIES = [
  {id:'all',name:'全部'},
  {id:'campus',name:'校园生活'},
  {id:'learning',name:'学习交流'},
  {id:'trade',name:'二手交易'},
  {id:'job',name:'游戏搭子'},
  {id:'chat',name:'闲聊灌水'}
];

let allPosts = [];
let currentCategory = 'all';

// 初始化
async function init() {
  showLoading();
  
  // 检查登录
  const userStr = sessionStorage.getItem('currentUser');
  if (!userStr) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    const user = JSON.parse(userStr);
    document.getElementById('userInfo').innerHTML = `
      <div class="avatar">${(user.nickname || user.username || '?').charAt(0).toUpperCase()}</div>
      <span>${user.nickname || user.username}</span>
    `;
  } catch(e) {
    console.error('解析用户失败:', e);
  }
  
  // 渲染分类
  renderCategories();
  
  // 加载帖子
  await loadPosts();
  
  hideLoading();
}

// 加载帖子
async function loadPosts() {
  try {
    const res = await fetch('./data/posts.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    
    const data = await res.json();
    allPosts = data.posts || [];
    
    renderPosts();
  } catch(e) {
    console.error('加载失败:', e);
    document.getElementById('postList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">❌</div>
        <div>加载失败: ${e.message}</div>
      </div>
    `;
  }
}

// 渲染分类
function renderCategories() {
  const html = CATEGORIES.map(c => `
    <div class="category-tag ${c.id === currentCategory ? 'active' : ''}" 
         onclick="filterCategory('${c.id}')">${c.name}</div>
  `).join('');
  document.getElementById('categories').innerHTML = html;
}

// 筛选分类
function filterCategory(cat) {
  currentCategory = cat;
  renderCategories();
  renderPosts();
}

// 渲染帖子
function renderPosts() {
  let posts = allPosts;
  
  if (currentCategory !== 'all') {
    posts = posts.filter(p => p.category === currentCategory);
  }
  
  // 置顶帖在前
  posts.sort((a, b) => {
    if (a.is_pinned && !b.is_pinned) return -1;
    if (!a.is_pinned && b.is_pinned) return 1;
    return 0;
  });
  
  document.getElementById('postCount').textContent = `${posts.length} 条`;
  
  if (posts.length === 0) {
    document.getElementById('postList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div>暂无帖子</div>
      </div>
    `;
    return;
  }
  
  const html = posts.map(p => `
    <div class="post-item ${p.is_pinned ? 'pinned' : ''}" onclick="viewPost(${p.id})">
      <div class="post-title">
        ${p.is_pinned ? '<span class="pin">📌</span>' : ''}
        ${p.title}
      </div>
      <div class="post-preview">${p.content}</div>
      <div class="post-meta">
        <span>👤 ${p.author_nickname || p.author || '匿名'}</span>
        <span>💬 ${p.reply_count || 0}</span>
        <span>⏰ ${timeAgo(p.created_at)}</span>
      </div>
    </div>
  `).join('');
  
  document.getElementById('postList').innerHTML = html;
}

// 时间格式化
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const s = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if (s < 60) return '刚刚';
  if (s < 3600) return Math.floor(s / 60) + '分钟前';
  if (s < 86400) return Math.floor(s / 3600) + '小时前';
  if (s < 2592000) return Math.floor(s / 86400) + '天前';
  return new Date(dateStr).toLocaleDateString('zh-CN');
}

// 查看帖子
function viewPost(id) {
  window.location.href = 'post.html?id=' + id;
}

// 显示/隐藏 loading
function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

// 启动
init();
</script>
</body>
</html>
