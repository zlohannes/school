<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛</title>
</head>
<body style="font-family:sans-serif;padding:20px;background:#f5f5f5">
  <h1 style="text-align:center;margin-bottom:20px">🏠 鹿城学院论坛</h1>
  <div id="content" style="background:white;padding:20px;border-radius:8px;max-width:800px;margin:0 auto">
    <p style="color:#666">加载中...</p>
  </div>
<script>
console.log('Script start');

var POSTS_KEY = 'forum_posts';

function init() {
  console.log('init');
  var data = localStorage.getItem(POSTS_KEY);
  var posts = [];
  if (data) {
    try { posts = JSON.parse(data); } catch(e) { console.log(e); }
  }
  
  var html = '<h2>帖子列表</h2>';
  if (posts.length === 0) {
    html += '<p>暂无帖子</p>';
  } else {
    posts.forEach(function(p) {
      html += '<div style="padding:15px;border-bottom:1px solid #eee"><strong>' + (p.title||'') + '</strong><br><small>' + (p.author||'') + ' | ' + (p.reply_count||0) + '回复</small></div>';
    });
  }
  document.getElementById('content').innerHTML = html;
  console.log('Done');
}

init();
</script>
</body>
</html>
