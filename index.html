<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 登录注册</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <script>sessionStorage.clear();</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{width:100%;max-width:420px}
    .card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.15)}
    h1{color:#333;text-align:center;font-size:22px;margin-bottom:3px}
    .subtitle{color:#666;text-align:center;font-size:13px;margin-bottom:20px}
    h2{color:#333;font-size:16px;margin-bottom:15px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-weight:600;color:#333;font-size:13px;margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .form-group input:focus{border-color:#667eea;outline:none}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .radio-group{display:flex;gap:12px;margin-top:6px}
    .radio-option{display:flex;align-items:center;gap:4px;font-size:13px}
    .btn{width:100%;background:#667eea;color:white;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
    .btn:hover{background:#5568d3}
    .switch{text-align:center;margin-top:12px;color:#666;font-size:13px}
    .switch a{color:#667eea;text-decoration:none;font-weight:600}
    .note{font-size:11px;color:#666;margin-top:3px}
    .note strong{color:#28a745}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1><img src="https://www.wzvtc.cn/favicon.ico" style="height:28px;vertical-align:middle;"> 鹿城学院论坛</h1>
      <p class="subtitle">温州职业技术学院</p>
      <div id="registerBox">
        <h2>📝 注册账号</h2>
        <form id="registerForm">
          <div class="form-group"><label>用户名 *</label><input type="text" id="regUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="公开显示的昵称"></div>
          <div class="row">
            <div class="form-group"><label>密码 *</label><input type="password" id="regPassword" placeholder="6-20位" required></div>
            <div class="form-group"><label>确认密码 *</label><input type="password" id="regConfirm" placeholder="再次输入" required></div>
          </div>
          <div class="form-group"><label>真实姓名 *</label><input type="text" id="regRealName" placeholder="仅管理员可见" required><div class="note"><strong>隐私：</strong>真实姓名仅管理员可见</div></div>
          <div class="row">
            <div class="form-group">
              <label>专业</label>
              <select id="regMajor">
                <option value="">请选择专业</option>
                <option value="金融科技应用">金融科技应用</option>
                <option value="大数据与会计">大数据与会计</option>
                <option value="市场营销">市场营销</option>
              </select>
            </div>
            <div class="form-group">
              <label>性别</label>
              <select id="regGender">
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>角色</label>
            <div class="radio-group">
              <label class="radio-option"><input type="radio" name="role" value="student" checked onclick="toggleMajor()"> 学生</label>
              <label class="radio-option"><input type="radio" name="role" value="teacher" onclick="toggleMajor()"> 老师</label>
              <label class="radio-option"><input type="radio" name="role" value="admin" onclick="checkAdmin()"> 管理员</label>
            </div>
          </div>
          <button type="submit" class="btn">注册</button>
        </form>
        <div class="switch">已有账号？<a href="#" onclick="showLogin()">点击登录</a></div>
      </div>
      <div id="loginBox" style="display:none;">
        <h2>🔐 用户登录</h2>
        <form id="loginForm">
          <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" required></div>
          <button type="submit" class="btn">登录</button>
        </form>
        <div class="switch">没有账号？<a href="#" onclick="showRegister()">注册</a></div>
      </div>
    </div>
  </div>
  <script>
const DB = 'lucheng_forum';
const ADMIN_CODE = 'admin';

function showLogin() {
  document.getElementById('registerBox').style.display = 'none';
  document.getElementById('loginBox').style.display = 'block';
}

function showRegister() {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('registerBox').style.display = 'block';
}

function toggleMajor() {
  const role = document.querySelector('input[name="role"]:checked').value;
  const majorSelect = document.getElementById('regMajor');
  if (role === 'teacher') {
    majorSelect.value = '';
    majorSelect.disabled = true;
  } else {
    majorSelect.disabled = false;
  }
}

function checkAdmin() {
  const code = prompt('请输入管理员注册码：');
  if (code !== ADMIN_CODE) {
    alert('注册码错误！只有管理员才能注册管理员账号。');
    document.querySelector('input[name="role"][value="student"]').checked = true;
    toggleMajor();
  }
}

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('users')) {
        db.createObjectStore('users', { keyPath: 'username' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function checkUser(username) {
  const db = await initDB();
  return new Promise(resolve => {
    const tx = db.transaction(['users'], 'readonly');
    const req = tx.objectStore('users').get(username);
    req.onsuccess = e => resolve(!!e.target.result);
  });
}

document.getElementById('registerForm').onsubmit = async e => {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const nickname = document.getElementById('regNickname').value.trim() || username;
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;
  const realName = document.getElementById('regRealName').value.trim();
  const major = document.getElementById('regMajor').value;
  const gender = document.getElementById('regGender').value;
  const role = document.querySelector('input[name="role"]:checked').value;

  if (password.length < 6 || password.length > 20) {
    alert('密码长度应为6-20位');
    return;
  }
  if (password !== confirm) {
    alert('两次密码不一致');
    return;
  }
  if (await checkUser(username)) {
    alert('用户名已存在');
    return;
  }

  const db = await initDB();
  const user = {
    username,
    nickname,
    password: btoa(password + 'lc'),
    realName,
    major,
    gender,
    role,
    createdAt: new Date().toISOString()
  };

  const tx = db.transaction(['users'], 'readwrite');
  tx.objectStore('users').put(user);
  tx.oncomplete = () => {
    alert('注册成功！请登录');
    showLogin();
    document.getElementById('loginUsername').value = username;
    document.getElementById('regUsername').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirm').value = '';
  };
};

document.getElementById('loginForm').onsubmit = async e => {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;

  const db = await initDB();
  const tx = db.transaction(['users'], 'readonly');
  const req = tx.objectStore('users').get(username);

  req.onsuccess = () => {
    const user = req.result;
    if (user && user.password === btoa(password + 'lc')) {
      sessionStorage.setItem('currentUser', JSON.stringify({
        username: user.username,
        nickname: user.nickname,
        role: user.role,
        realName: user.realName
      }));
      window.location.href = 'forum.html';
    } else {
      alert('用户名或密码错误');
    }
  };
};
  </script>
</body>
</html>
