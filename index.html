<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 登录注册</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <script>sessionStorage.clear();</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{width:100%;max-width:420px}
    .card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.15)}
    h1{color:#333;text-align:center;font-size:22px;margin-bottom:3px}
    .subtitle{color:#666;text-align:center;font-size:13px;margin-bottom:20px}
    h2{color:#333;font-size:16px;margin-bottom:15px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-weight:600;color:#333;font-size:13px;margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .form-group input:focus{border-color:#667eea;outline:none}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .radio-group{display:flex;gap:12px;margin-top:6px}
    .radio-option{display:flex;align-items:center;gap:4px;font-size:13px}
    .btn{width:100%;background:#667eea;color:white;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
    .btn:hover{background:#5568d3}
    .switch{text-align:center;margin-top:12px;color:#666;font-size:13px}
    .switch a{color:#667eea;text-decoration:none;font-weight:600}
    .note{font-size:11px;color:#666;margin-top:3px}
    .note strong{color:#28a745}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🏫 鹿城学院论坛</h1>
      <p class="subtitle">温州职业技术学院</p>
      <div id="registerBox">
        <h2>📝 注册账号</h2>
        <form id="registerForm">
          <div class="form-group"><label>用户名 *</label><input type="text" id="regUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="公开显示的昵称"></div>
          <div class="row">
            <div class="form-group"><label>密码 *</label><input type="password" id="regPassword" placeholder="6-20位" required></div>
            <div class="form-group"><label>确认密码 *</label><input type="password" id="regConfirm" placeholder="再次输入" required></div>
          </div>
          <div class="form-group"><label>真实姓名 *</label><input type="text" id="regRealName" placeholder="仅管理员可见" required><div class="note"><strong>隐私：</strong>真实姓名仅管理员可见</div></div>
          <div class="row">
            <div class="form-group"><label>专业</label><select id="regMajor"><option value="">请选择</option><option value="计算机应用技术">计算机应用技术</option><option value="软件技术">软件技术</option><option value="网络技术">网络技术</option><option value="数字媒体">数字媒体</option><option value="电子商务">电子商务</option></select></div>
            <div class="form-group"><label>性别</label><select id="regGender"><option value="保密">保密</option><option value="男">男</option><option value="女">女</option></select></div>
          </div>
          <div class="form-group"><label>角色</label><div class="radio-group"><label class="radio-option"><input type="radio" name="role" value="student" checked> 学生</label><label class="radio-option"><input type="radio" name="role" value="teacher"> 老师</label><label class="radio-option"><input type="radio" name="role" value="admin"> 管理员</label></div></div>
          <button type="submit" class="btn">注册</button>
        </form>
        <div class="switch">已有账号？<a href="#" onclick="showLogin()">点击登录</a></div>
      </div>
      <div id="loginBox" style="display:none;">
        <h2>🔐 用户登录</h2>
        <form id="loginForm">
          <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" required></div>
          <button type="submit" class="btn">登录</button>
        </form>
        <div class="switch">没有账号？<a href="#" onclick="showRegister()">注册</a></div>
      </div>
    </div>
  </div>
  <script>
const DB='lucheng_forum';
function showLogin(){document.getElementById('registerBox').style.display='none';document.getElementById('loginBox').style.display='block'}
function showRegister(){document.getElementById('loginBox').style.display='none';document.getElementById('registerBox').style.display='block'}
function initDB(){return new Promise((r,e)=>{const t=indexedDB.open(DB,1);t.onupgradeneeded=n=>{const a=n.target.result;if(!a.objectStoreNames.contains('users'))a.createObjectStore('users',{keyPath:'username'})};t.onsuccess=n=>r(n.target.result);t.onerror=n=>e(n.target.error)})}
async function checkUser(u){const a=await initDB();return new Promise(r=>{const t=a.transaction(['users'],'readonly');const n=t.objectStore('users').get(u);n.onsuccess=e=>r(!!e.target.result)})}
document.getElementById('registerForm').onsubmit=async e=>{e.preventDefault();const u=document.getElementById('regUsername').value.trim();const n=document.getElementById('regNickname').value.trim()||u;const p=document.getElementById('regPassword').value;const c=document.getElementById('regConfirm').value;const rn=document.getElementById('regRealName').value.trim();const m=document.getElementById('regMajor').value;const g=document.getElementById('regGender').value;const r=document.querySelector('input[name="role"]:checked').value;if(p.length<6||p.length>20){alert('密码6-20位');return}if(p!==c){alert('密码不一致');return}if(await checkUser(u)){alert('用户名已存在');return}const a=await initDB();const db={username:u,nickname:n,password:btoa(p+'lc'),realName:rn,major:m,gender:g,role:r,createdAt:new Date().toISOString()};const tx=a.transaction(['users'],'readwrite');tx.objectStore('users').put(db);tx.oncomplete=()=>{alert('注册成功！');showLogin();document.getElementById('loginUsername').value=u;document.getElementById('regUsername').value='';document.getElementById('regPassword').value='';document.getElementById('regConfirm').value=''}}
document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();const u=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value;const a=await initDB();const tx=a.transaction(['users'],'readonly');const req=tx.objectStore('users').get(u);req.onsuccess=()=>{const user=req.result;if(user&&user.password===btoa(p+'lc')){sessionStorage.setItem('currentUser',JSON.stringify({username:user.username,nickname:user.nickname,role:user.role}));window.location.href='forum.html'}else{alert('用户名或密码错误')}}}
  </script>
</body>
</html>
