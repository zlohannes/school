<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>鹿城学院论坛 - 登录注册</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .container{width:100%;max-width:420px}
    .card{background:white;padding:24px 20px;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,0.2)}
    h1{color:#333;text-align:center;font-size:20px;margin-bottom:4px}
    .subtitle{color:#666;text-align:center;font-size:13px;margin-bottom:18px}
    
    .tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid #eee}
    .tab{padding:10px 16px;color:#666;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:14px}
    .tab.active{color:#667eea;border-bottom-color:#667eea;font-weight:600}
    
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-weight:600;color:#333;font-size:13px;margin-bottom:6px}
    .form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;appearance:none;-webkit-appearance:none}
    .form-group input:focus,.form-group select:focus{border-color:#667eea;outline:none}
    .form-group select{background:#fff}
    .form-group select option{padding:8px}
    .note{font-size:11px;color:#888;margin-top:4px}
    
    .btn{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:active{opacity:0.9}
    
    .guest-btn{width:100%;background:linear-gradient(135deg,#10b981,#059669);color:white;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}
    .guest-btn:active{opacity:0.9}
    
    .hidden{display:none}
    .error{background:#fee;border:1px solid #fcc;color:#c33;padding:10px;border-radius:8px;margin-bottom:14px;font-size:13px;display:none}
    
    .checkbox-group{display:flex;align-items:flex-start;gap:8px;margin-top:10px}
    .checkbox-group input{width:16px;height:16px;margin-top:2px;flex-shrink:0}
    .checkbox-group label{font-weight:normal;font-size:12px;color:#666;line-height:1.4}
    .checkbox-group a{color:#667eea}
    
    @media(max-width:400px){
      .card{padding:20px 16px}
      h1{font-size:18px}
      .form-group input,.form-group select{padding:10px;font-size:14px}
      .btn,.guest-btn{padding:10px;font-size:14px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1><img src="logo.jpg" alt="校徽" style="height:32px;width:32px;vertical-align:middle;border-radius:4px;"> 鹿城学院论坛</h1>
      <p class="subtitle">温州职业技术学院</p>
      
      <div class="tabs">
        <div class="tab active" id="tabLogin" onclick="showTab('login')">登录</div>
        <div class="tab" id="tabRegister" onclick="showTab('register')">注册账号</div>
      </div>
      
      <div class="error" id="error"></div>
      
      <div id="loginBox">
        <form id="loginForm" onsubmit="doLogin(event)">
          <div class="form-group"><label>用户名 *</label><input type="text" id="loginUsername" required placeholder="请输入用户名" autocomplete="username"></div>
          <div class="form-group"><label>密码 *</label><input type="password" id="loginPassword" required placeholder="请输入密码" autocomplete="current-password"></div>
          <button type="submit" class="btn">登录</button>
        </form>
      </div>
      
      <div id="registerBox" class="hidden">
        <form id="registerForm" onsubmit="doRegister(event)">
          <div class="form-group">
            <label>用户名 *</label>
            <input type="text" id="regUsername" required placeholder="请输入用户名" maxlength="20" autocomplete="username">
            <div class="note">用户名注册后不可更改</div>
          </div>
          <div class="form-group"><label>昵称 *</label><input type="text" id="regNickname" required placeholder="公开显示的昵称" maxlength="20"></div>
          <div class="form-group"><label>密码 *</label><input type="password" id="regPassword" required placeholder="6-20位" minlength="6" maxlength="20" autocomplete="new-password"></div>
          <div class="form-group"><label>确认密码 *</label><input type="password" id="regConfirmPassword" required placeholder="再次输入" minlength="6" maxlength="20" autocomplete="new-password"></div>
          <div class="form-group"><label>真实姓名 *</label><input type="text" id="regRealName" required placeholder="仅管理员可见"></div>
          <div class="form-group">
            <label>专业</label>
            <select id="regMajor">
              <option value="">请选择专业</option>
              <option value="金融科技应用">金融科技应用</option>
              <option value="大数据与会计">大数据与会计</option>
              <option value="国际商务">国际商务</option>
              <option value="市场营销">市场营销</option>
            </select>
          </div>
          <div class="form-group">
            <label>性别 *</label>
            <select id="regGender" required>
              <option value="">请选择</option>
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
          <div class="form-group">
            <label>角色 *</label>
            <select id="regRole" required>
              <option value="student">学生</option>
              <option value="teacher">老师</option>
            </select>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="agree" required>
            <label for="agree">我已阅读并同意 <a href="agreement.html" target="_blank">《用户协议》</a></label>
          </div>
          <button type="submit" class="btn">注册</button>
        </form>
      </div>
      
      <button class="guest-btn" onclick="guestLogin()">👀 游客浏览</button>
    </div>
  </div>

<script>
const USERS_KEY = 'forum_users';
const ADMIN_CODE = 'zrw';
const JSONBIN_KEY = '$2a$10$59Djck2h5v5Jn9Iw6mJXSOowLLNncsWykFED5zdhoe1J9ATaVmcJu';
const JSONBIN_ID = '69c11555aa77b81da90e70f1';
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/' + JSONBIN_ID;

async function syncUsersToCloud(users) {
  try {
    // 先读取云端现有数据，避免覆盖其他字段
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    const record = data.record || {};
    
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-ACCESS-KEY': JSONBIN_KEY
      },
      body: JSON.stringify({
        users: users,
        posts: record.posts || [],
        replies: record.replies || [],
        notifications: record.notifications || []
      })
    });
  } catch(e) {
    console.log('云同步失败:', e);
  }
}

async function loadUsersFromCloud() {
  try {
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    if (data.record && data.record.users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(data.record.users));
      return data.record.users;
    }
  } catch(e) {
    console.log('云端加载失败:', e);
  }
  return null;
}

function $(id){return document.getElementById(id)}

function getUsers() {
  const data = localStorage.getItem(USERS_KEY);
  return data ? JSON.parse(data) : [];
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  syncUsersToCloud(users); // 同步到云端
}

function showTab(tab) {
  $('tabLogin').className = tab === 'login' ? 'tab active' : 'tab';
  $('tabRegister').className = tab === 'register' ? 'tab active' : 'tab';
  $('loginBox').className = tab === 'login' ? '' : 'hidden';
  $('registerBox').className = tab === 'register' ? '' : 'hidden';
  hideError();
}

function showError(msg) { $('error').textContent = msg; $('error').style.display = 'block'; }
function hideError() { $('error').style.display = 'none'; }

function doLogin(e) {
  e.preventDefault();
  hideError();
  const username = $('loginUsername').value.trim();
  const password = $('loginPassword').value;
  
  // 先从本地查找
  const users = getUsers();
  let user = null;
  
  // 优先从 localStorage 查找用户（包括管理员）
  user = users.find(u => u.username === username && u.password === password);
  
  if (!user && username === 'lohannes' && password === 'zrw521..') {
    // 管理员特殊处理：从 localStorage 获取最新信息，如果没有则创建
    user = users.find(u => u.username === 'lohannes');
    if (!user) {
      // 管理员首次登录，创建用户记录
      user = {
        username: 'lohannes',
        password: 'zrw521..',
        nickname: '管理员',
        realName: '管理员',
        role: 'admin',
        gender: '',
        avatar: '',
        createdAt: new Date().toISOString()
      };
      users.push(user);
      saveUsers(users);
    }
  }
  
  if (user) {
    // 检查账户是否被封禁
    if (user.is_banned) {
      showError('❌ 您的账户已被封禁，请联系管理员解封');
      return;
    }
    
    // 保存完整用户信息到 sessionStorage
    sessionStorage.setItem('currentUser', JSON.stringify(user));
    window.location.href = 'forum.html';
  } else {
    showError('用户名或密码错误');
  }
  
  // 后台异步同步云端（不阻塞登录）
  loadUsersFromCloud().catch(() => {});
}

function doRegister(e) {
  e.preventDefault();
  hideError();
  
  const username = $('regUsername').value.trim();
  const nickname = $('regNickname').value.trim();
  const password = $('regPassword').value;
  const confirmPassword = $('regConfirmPassword').value;
  const realName = $('regRealName').value.trim();
  const major = $('regMajor').value;
  const gender = $('regGender').value;
  const role = $('regRole').value;
  
  if (!username || !nickname || !password || !realName || !gender) { showError('请填写所有必填项'); return; }
  if (password !== confirmPassword) { showError('两次输入的密码不一致'); return; }
  if (password.length < 6 || password.length > 20) { showError('密码长度应为6-20位'); return; }
  
  // 从本地获取现有用户
  const users = getUsers();
  if (users.find(u => u.username === username)) { showError('用户名已存在'); return; }
  
  const newUser = {username, password, nickname, realName, major, gender, role, createdAt: new Date().toISOString()};
  users.push(newUser);
  
  // 保存到本地并同步到云端
  saveUsers(users).then(() => {
    // 注册后自动登录
    sessionStorage.setItem('currentUser', JSON.stringify(newUser));
    window.location.href = 'forum.html';
  }).catch(() => {
    // 即使同步失败也允许登录
    sessionStorage.setItem('currentUser', JSON.stringify(newUser));
    window.location.href = 'forum.html';
  });
}

async function saveUsers(users) {
  // 先保存到本地
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  
  // 同步到云端（合并模式 - 保留云端已有用户）
  try {
    const res = await fetch(JSONBIN_URL, {
      headers: {'X-ACCESS-KEY': JSONBIN_KEY}
    });
    const data = await res.json();
    const record = data.record || {};
    
    // 合并云端和本地用户
    let cloudUsers = record.users || [];
    users.forEach(newUser => {
      if (!cloudUsers.find(u => u.username === newUser.username)) {
        cloudUsers.push(newUser);
      }
    });
    
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-ACCESS-KEY': JSONBIN_KEY
      },
      body: JSON.stringify({
        users: cloudUsers,
        posts: record.posts || [],
        replies: record.replies || [],
        notifications: record.notifications || []
      })
    });
  } catch(e) {
    console.log('云同步失败:', e);
  }
}

function guestLogin() {
  sessionStorage.setItem('currentUser', JSON.stringify({username:'__GUEST__',nickname:'游客',role:'guest'}));
  window.location.href = 'forum.html';
}
</script>
</body>
</html>
