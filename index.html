<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛 - 登录注册</title>
  <meta name="description" content="鹿城学院论坛 - 温州职业技术学院学生交流平台，分享学习心得、校园生活、二手交易、游戏组队">
  <meta name="keywords" content="鹿城学院,温州职业技术学院,校园论坛,学生社区,学习交流,校园生活">
  <meta name="author" content="鹿城学院">
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <meta property="og:title" content="鹿城学院论坛">
  <meta property="og:description" content="温州职业技术学院学生交流平台">
  <meta property="og:type" content="website">
  <!-- 性能优化：预连接关键域名 -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://tsxnnzcteavcpowsbaye.supabase.co" crossorigin>
  <link rel="preconnect" href="https://www.wzvtc.cn" crossorigin>
  <!-- 性能优化：DNS 预解析 -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="dns-prefetch" href="https://tsxnnzcteavcpowsbaye.supabase.co">
  <!-- 性能优化：预加载关键资源 -->
  <link rel="preload" href="./config.js" as="script">
  <script>sessionStorage.clear();</script>
  <!-- 性能优化：异步加载 Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .container{width:100%;max-width:420px}
    .card{background:white;padding:25px;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.15)}
    h1{color:#333;text-align:center;font-size:22px;margin-bottom:3px}
    .subtitle{color:#666;text-align:center;font-size:13px;margin-bottom:20px}
    h2{color:#333;font-size:16px;margin-bottom:15px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-weight:600;color:#333;font-size:13px;margin-bottom:4px}
    .form-group input,.form-group select{width:100%;padding:9px;border:1px solid #ddd;border-radius:6px;font-size:13px}
    .form-group input:focus{border-color:#667eea;outline:none}
    .form-group select{background:#2a2a3e;color:#fff}
    .form-group select option{background:#2a2a3e;color:#fff}
    .form-group select:disabled{background:#3a3a4e;color:#999}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .radio-group{display:flex;gap:12px;margin-top:6px}
    .radio-option{display:flex;align-items:center;gap:4px;font-size:13px}
    .btn{width:100%;background:#667eea;color:white;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px}
    .btn:hover{background:#5568d3}
    .btn:disabled{background:#aaa;cursor:not-allowed}
    .switch{text-align:center;margin-top:12px;color:#666;font-size:13px}
    .switch a{color:#667eea;text-decoration:none;font-weight:600}
    .note{font-size:11px;color:#666;margin-top:3px}
    .note strong{color:#28a745}
    .loading{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.8);display:none;align-items:center;justify-content:center;z-index:999}
    .loading.show{display:flex}
    .loading .spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* 游客按钮样式 */
    .guest-btn{width:100%;background:linear-gradient(135deg,#10b981,#059669);color:white;padding:10px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
    .guest-btn:hover{background:linear-gradient(135deg,#059669,#047857)}
    .guest-divider{display:flex;align-items:center;margin:15px 0;color:#999;font-size:12px}
    .guest-divider::before,.guest-divider::after{content:'';flex:1;height:1px;background:#ddd}
    .guest-divider span{padding:0 10px}
  </style>
</head>
<body>
  <div class="loading" id="loading"><div class="spinner"></div></div>
  <div class="container">
    <div class="card">
      <h1><img src="https://www.wzvtc.cn/favicon.ico" style="height:28px;vertical-align:middle;"> 鹿城学院论坛</h1>
      <p class="subtitle">温州职业技术学院</p>
      <div id="registerBox">
        <h2>📝 注册账号</h2>
        <form id="registerForm">
          <div class="form-group"><label>用户名 *</label><input type="text" id="regUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>昵称</label><input type="text" id="regNickname" placeholder="公开显示的昵称"></div>
          <div class="row">
            <div class="form-group"><label>密码 *</label><input type="password" id="regPassword" placeholder="6-20位" required></div>
            <div class="form-group"><label>确认密码 *</label><input type="password" id="regConfirm" placeholder="再次输入" required></div>
          </div>
          <div class="form-group"><label>真实姓名 *</label><input type="text" id="regRealName" placeholder="仅管理员可见" required><div class="note"><strong>隐私：</strong>真实姓名仅管理员可见</div></div>
          <div class="row">
            <div class="form-group">
              <label>专业</label>
              <select id="regMajor">
                <option value="">请选择专业</option>
                <option value="金融科技应用">金融科技应用</option>
                <option value="大数据与会计">大数据与会计</option>
                <option value="市场营销">市场营销</option>
                <option value="国际商务">国际商务</option>
              </select>
            </div>
            <div class="form-group">
              <label>性别</label>
              <select id="regGender">
                <option value="男">男</option>
                <option value="女" selected>女</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>角色</label>
            <div class="radio-group">
              <label class="radio-option"><input type="radio" name="role" value="student" checked> 学生</label>
              <label class="radio-option"><input type="radio" name="role" value="teacher"> 老师</label>
              <label class="radio-option"><input type="radio" name="role" value="admin"> 管理员</label>
            </div>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:15px">
            <input type="checkbox" id="agreeTerms" required style="width:18px;height:18px;accent-color:#667eea">
            <label for="agreeTerms" style="margin:0;font-size:13px;cursor:pointer">
              我已阅读并同意 <a href="agreement.html" target="_blank" style="color:#667eea;text-decoration:none;font-weight:600">《用户协议》</a>
            </label>
          </div>
          <button type="submit" class="btn" id="regBtn">注册</button>
        </form>
        <div class="switch">已有账号？<a href="#" id="toLoginBtn">点击登录</a></div>
        <div class="guest-divider"><span>或</span></div>
        <button class="guest-btn" id="guestBtn">👀 游客浏览（仅查看）</button>
        <div class="note" style="text-align:center;margin-top:8px">游客模式只能浏览帖子列表，无法查看详情和互动</div>
      </div>
      <div id="loginBox" style="display:none;">
        <h2>🔐 用户登录</h2>
        <form id="loginForm">
          <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" required></div>
          <button type="submit" class="btn" id="loginBtn">登录</button>
        </form>
        <div class="switch">没有账号？<a href="#" id="toRegisterBtn">注册</a> | <a href="#" id="forgotPwdBtn">忘记密码</a></div>
        <div class="guest-divider"><span>或</span></div>
        <button class="guest-btn" id="guestBtn2">👀 游客浏览（仅查看）</button>
      </div>
      <div id="resetBox" style="display:none;">
        <h2>🔑 重置密码</h2>
        <form id="resetForm">
          <div class="form-group"><label>用户名</label><input type="text" id="resetUsername" placeholder="请输入用户名" required></div>
          <div class="form-group"><label>真实姓名</label><input type="text" id="resetRealName" placeholder="注册时填写的真实姓名" required></div>
          <div class="form-group"><label>新密码</label><input type="password" id="resetPassword" placeholder="6-20位新密码" required></div>
          <div class="form-group"><label>确认新密码</label><input type="password" id="resetConfirm" placeholder="再次输入新密码" required></div>
          <button type="submit" class="btn" id="resetBtn">重置密码</button>
        </form>
        <div class="switch"><a href="#" id="toLoginFromReset">返回登录</a></div>
      </div>
      <div class="agreement" style="margin-top:20px;padding-top:15px;border-top:1px solid #eee;text-align:center;font-size:12px;color:#666">
        使用本论坛即表示您同意 <a href="agreement.html" target="_blank" style="color:#667eea;text-decoration:none;font-weight:600">《用户协议》</a><br>
        <span style="color:#999;font-size:11px">严禁发布违法违规、造谣、人身攻击等内容</span>
      </div>
    </div>
  </div>
  <script src="./config.js"></script>
<script>
(function(){
  var SB_URL = window.SUPABASE_URL;
  var SB_KEY = window.SUPABASE_ANON_KEY;
  var sb = window.supabase.createClient(SB_URL, SB_KEY);
  var ADMIN_CODE_HASH = window.ADMIN_CODE_HASH;
  var PASSWORD_SALT = window.PASSWORD_SALT || 'lc_forum_2026';

  function $(id){return document.getElementById(id)}
  function showLoading(){$('loading').classList.add('show')}
  function hideLoading(){$('loading').classList.remove('show')}

  // SHA-256 哈希函数
  async function sha256(text) {
    var encoder = new TextEncoder();
    var data = encoder.encode(text);
    var hashBuffer = await crypto.subtle.digest('SHA-256', data);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  // 密码加密：SHA-256(密码 + 盐值)
  async function hashPassword(password) {
    return await sha256(password + PASSWORD_SALT);
  }

  // 验证管理员注册码
  async function verifyAdminCode(code) {
    var hash = await sha256(code);
    return hash === ADMIN_CODE_HASH;
  }

  function showLogin(){$('registerBox').style.display='none';$('loginBox').style.display='block';$('resetBox').style.display='none'}
  function showRegister(){$('loginBox').style.display='none';$('registerBox').style.display='block';$('resetBox').style.display='none'}
  function showReset(){$('registerBox').style.display='none';$('loginBox').style.display='none';$('resetBox').style.display='block'}

  // 角色切换
  document.querySelectorAll('input[name="role"]').forEach(function(radio){
    radio.addEventListener('change', async function(){
      var role = this.value;
      var majorSelect = $('regMajor');
      if(role === 'teacher' || role === 'admin'){
        majorSelect.disabled = true;
        majorSelect.value = '';
      } else {
        majorSelect.disabled = false;
      }
      if(role === 'admin'){
        var code = prompt('请输入管理员注册码：');
        if(!code) {
          // 用户取消，重置为学生
          document.querySelector('input[name="role"][value="student"]').checked = true;
          $('regMajor').disabled = false;
          return;
        }
        var valid = await verifyAdminCode(code);
        if(!valid){
          alert('注册码错误！');
          document.querySelector('input[name="role"][value="student"]').checked = true;
          $('regMajor').disabled = false;
        }
      }
    });
  });

  // 注册
  $('registerForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var u = $('regUsername').value.trim();
    var n = $('regNickname').value.trim() || u;
    var p = $('regPassword').value;
    var c = $('regConfirm').value;
    var rn = $('regRealName').value.trim();
    var m = $('regMajor').value;
    var g = $('regGender').value;
    var r = document.querySelector('input[name="role"]:checked').value;

    if(p.length < 6 || p.length > 20){ alert('密码长度应为6-20位'); return }
    if(p !== c){ alert('两次密码不一致'); return }
    if(!$('agreeTerms').checked){ alert('请阅读并同意用户协议'); return }

    showLoading();
    $('regBtn').disabled = true;

    try {
      // 检查用户名是否已存在
      var checkRes = await sb.from('users').select('username').eq('username', u).maybeSingle();
      if(checkRes.data){
        hideLoading();
        $('regBtn').disabled = false;
        alert('用户名已存在');
        return;
      }
      
      // 检查真实姓名是否已存在（防止刷号）
      var nameCheckRes = await sb.from('users').select('username').eq('real_name', rn).maybeSingle();
      if(nameCheckRes.data){
        hideLoading();
        $('regBtn').disabled = false;
        alert('该真实姓名已注册过账号，请直接登录');
        showLogin();
        $('loginUsername').value = nameCheckRes.data.username;
        return;
      }

      // 使用 SHA-256 加密密码
      var hashedPassword = await hashPassword(p);

      var insertRes = await sb.from('users').insert({
        username: u,
        nickname: n,
        password: hashedPassword,
        real_name: rn,
        major: m,
        gender: g,
        role: r
      });

      hideLoading();
      $('regBtn').disabled = false;

      if(insertRes.error){
        alert('注册失败：' + insertRes.error.message);
        return;
      }

      alert('注册成功！请登录');
      showLogin();
      $('loginUsername').value = u;
      $('regUsername').value = '';
      $('regPassword').value = '';
      $('regConfirm').value = '';
    } catch(err) {
      hideLoading();
      $('regBtn').disabled = false;
      alert('网络错误，请重试');
    }
  });

  // 登录
  $('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var u = $('loginUsername').value.trim();
    var p = $('loginPassword').value;

    showLoading();
    $('loginBtn').disabled = true;

    try {
      var res = await sb.from('users').select('*').eq('username', u).maybeSingle();
      hideLoading();
      $('loginBtn').disabled = false;

      var user = res.data;
      if(!user){ alert('用户名不存在'); return }

      // 使用 SHA-256 验证密码
      var hashedInput = await hashPassword(p);
      if(user.password !== hashedInput){ alert('密码错误'); return }

      if(user.is_banned){ alert('账号已被封禁，请联系管理员'); return }

      sessionStorage.setItem('currentUser', JSON.stringify({
        username: user.username,
        nickname: user.nickname,
        role: user.role,
        realName: user.real_name
      }));
      window.location.href = 'forum.html';
    } catch(err) {
      hideLoading();
      $('loginBtn').disabled = false;
      alert('网络连接失败，请重试');
    }
  });

  $('toLoginBtn').addEventListener('click', function(e){ e.preventDefault(); showLogin(); });
  $('toRegisterBtn').addEventListener('click', function(e){ e.preventDefault(); showRegister(); });
  $('forgotPwdBtn').addEventListener('click', function(e){ e.preventDefault(); showReset(); });
  $('toLoginFromReset').addEventListener('click', function(e){ e.preventDefault(); showLogin(); });

  // 游客登录
  function guestLogin(){
    sessionStorage.setItem('currentUser', JSON.stringify({
      username: '__GUEST__',
      nickname: '游客',
      role: 'guest',
      realName: ''
    }));
    window.location.href = 'forum.html';
  }
  $('guestBtn').addEventListener('click', guestLogin);
  if($('guestBtn2')) $('guestBtn2').addEventListener('click', guestLogin);

  // 重置密码
  $('resetForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var u = $('resetUsername').value.trim();
    var rn = $('resetRealName').value.trim();
    var p = $('resetPassword').value;
    var c = $('resetConfirm').value;

    if(p.length < 6 || p.length > 20){ alert('密码长度应为6-20位'); return }
    if(p !== c){ alert('两次密码不一致'); return }

    showLoading();
    $('resetBtn').disabled = true;

    try {
      var res = await sb.from('users').select('*').eq('username', u).maybeSingle();
      var user = res.data;
      if(!user){ hideLoading(); $('resetBtn').disabled = false; alert('用户名不存在'); return }
      if(user.real_name !== rn){ hideLoading(); $('resetBtn').disabled = false; alert('真实姓名不正确'); return }

      var hashedPassword = await hashPassword(p);
      var updateRes = await sb.from('users').update({password: hashedPassword}).eq('username', u);
      
      hideLoading();
      $('resetBtn').disabled = false;
      
      if(updateRes.error){ alert('重置失败：' + updateRes.error.message); return }
      alert('密码重置成功！请用新密码登录');
      showLogin();
      $('loginUsername').value = u;
      $('resetUsername').value = '';
      $('resetRealName').value = '';
      $('resetPassword').value = '';
      $('resetConfirm').value = '';
    } catch(err) {
      hideLoading();
      $('resetBtn').disabled = false;
      alert('网络错误，请重试');
    }
  });
})();
  </script>
</body>
</html>
