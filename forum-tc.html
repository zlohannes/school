<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿城学院论坛</title>
  <link rel="icon" href="https://www.wzvtc.cn/favicon.ico">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0f14;color:#e9f0f6;min-height:100vh}
    .navbar{position:sticky;top:0;z-index:100;background:rgba(11,15,20,0.9);border-bottom:1px solid rgba(255,255,255,0.1);padding:12px 16px}
    .nav-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:12px}
    .nav-logo{font-size:18px;font-weight:700;color:#fff;text-decoration:none}
    .nav-links{margin-left:auto;display:flex;gap:8px}
    .nav-link{color:#9fb2c3;padding:6px 12px;border-radius:6px;text-decoration:none;font-size:14px}
    .nav-link:hover{color:#fff}
    .btn{padding:6px 12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;border-radius:6px;cursor:pointer}
    .main{max-width:1080px;margin:16px auto;padding:0 16px}
    .card{background:#121821;border:1px solid rgba(255,255,255,0.1);border-radius:14px;margin-bottom:16px}
    .card-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.1);font-weight:600}
    .post-item{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer}
    .post-item:hover{background:rgba(255,255,255,0.02)}
    .post-title{font-size:15px;font-weight:600;margin-bottom:6px}
    .post-preview{color:#9fb2c3;font-size:13px;margin-bottom:8px}
    .post-meta{display:flex;gap:12px;font-size:12px;color:#9fb2c3}
    .category-tag{padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600}
    .cat-campus{background:rgba(33,150,243,0.2);color:#2196F3}
    .loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0f14;display:flex;align-items:center;justify-content:center;z-index:500}
    .loading.hidden{display:none}
  </style>
</head>
<body>
  <div class="loading" id="loading"><div>加载中...</div></div>
  
  <nav class="navbar">
    <div class="nav-inner">
      <a href="forum.html" class="nav-logo">鹿城学院论坛</a>
      <div class="nav-links">
        <a href="forum.html" class="nav-link">首页</a>
        <span id="userInfo"></span>
        <button class="btn" onclick="logout()">退出</button>
      </div>
    </div>
  </nav>
  
  <main class="main">
    <div class="card">
      <div class="card-header">📢 帖子列表</div>
      <div id="postList"></div>
    </div>
  </main>

<script>
const CLOUD_API = 'https://school-7g0r6pyl5a3b9046.service.tcloudbase.com';

function $(id){return document.getElementById(id);}

// 检查登录
const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
if (!currentUser.username) {
  window.location.href = 'index.html';
}

// 显示用户信息
$('userInfo').textContent = currentUser.nickname || currentUser.username;

// 加载帖子
async function loadPosts() {
  try {
    const res = await fetch(`${CLOUD_API}/getPosts`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({limit: 50})
    });
    const data = await res.json();
    
    if (data.code === 0) {
      renderPosts(data.data);
    }
  } catch (err) {
    console.error('加载失败:', err);
  }
  $('loading').classList.add('hidden');
}

// 渲染帖子
function renderPosts(posts) {
  const html = posts.map(p => `
    <div class="post-item" onclick="gotoPost('${p.id}')">
      <div class="post-title">${p.title}</div>
      <div class="post-preview">${p.content.substring(0, 100)}...</div>
      <div class="post-meta">
        <span class="category-tag cat-${p.category}">${p.category}</span>
        <span>👤 ${p.author_nickname}</span>
        <span>💬 ${p.reply_count || 0}</span>
      </div>
    </div>
  `).join('');
  
  $('postList').innerHTML = html || '<div style="padding:40px;text-align:center">暂无帖子</div>';
}

// 跳转帖子详情
function gotoPost(id) {
  if (currentUser.role === 'guest') {
    alert('游客无法查看详情，请登录');
    return;
  }
  window.location.href = `post.html?id=${id}`;
}

// 退出
function logout() {
  sessionStorage.clear();
  window.location.href = 'index.html';
}

// 加载
loadPosts();
</script>
</body>
</html>
